<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TOP-ELECTS COLLEGE - Advanced Result Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .school-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .school-logo .default-logo {
            font-size: 42px;
        }
        .header-text h1 {
            font-size: 2em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .header-text p {
            font-size: 1em;
            opacity: 0.9;
            font-style: italic;
        }
        .nav {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .nav button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }
        .nav .logout-btn {
            background: #dc3545;
            margin-left: auto;
        }
        .nav .logout-btn:hover {
            background: #c82333;
        }
        .main-content {
            padding: 30px;
            min-height: 500px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }
        button {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #2a5298;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
        }
        .grid-2, .grid-3 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .status-approved { color: green; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .fee-paid { color: green; font-weight: bold; }
        .fee-unpaid { color: red; font-weight: bold; }
        .logo-upload-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #1e3c72;
        }
        .logo-upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select { margin-bottom: 15px; }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }
        .active-session-banner {
            background: #e8f0fe;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #1e3c72;
        }
        .result-type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            background: #6c757d;
            color: white;
        }
        .result-type-midterm { background: #17a2b8; }
        .result-type-final { background: #28a745; }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .nav button { font-size: 12px; padding: 8px 12px; }
            .header { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="school-logo" id="schoolLogoContainer">
            <span class="default-logo">🏫</span>
        </div>
        <div class="header-text">
            <h1>TOP-ELECTS COLLEGE</h1>
            <p>Advanced Result Portal</p>
        </div>
    </div>
    <div id="content"></div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Edit Item</h3>
        <div id="modalBody"></div>
        <button id="modalSaveBtn">Save Changes</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, 
        doc, getDoc, setDoc, updateDoc,
        collection, getDocs, addDoc, deleteDoc, query, where, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4211tsKyps-6VaAhmWzqQcua9bA4bYFY",
        authDomain: "anyportal-4faa1.firebaseapp.com",
        projectId: "anyportal-4faa1",
        storageBucket: "anyportal-4faa1.firebasestorage.app",
        messagingSenderId: "529610323405",
        appId: "1:529610323405:web:049d47c1671c5213c1c084"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ------------------------- GLOBAL STATE -------------------------
    let currentUser = null;
    let currentTeacherView = 'midterm';
    let schoolData = { subjects: [], classes: [] };
    let teachers = [];
    let students = [];
    let results = [];
    let teacherSubjects = [];
    let sessions = [];
    let users = [];
    let editCallback = null;

    window.closeModal = function() {
        document.getElementById('editModal').style.display = 'none';
    };

    function showModal(title, bodyHtml, onSave) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('editModal').style.display = 'flex';
        editCallback = onSave;
        const saveBtn = document.getElementById('modalSaveBtn');
        saveBtn.onclick = () => {
            if (editCallback) editCallback();
            closeModal();
        };
    }

    function showAlert(containerId, message, type = 'error') {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => { if (container) container.innerHTML = ''; }, 3000);
    }

    // ------------------------- FIREBASE LISTENERS -------------------------
    async function loadInitialData() {
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        if (schoolDoc.exists()) {
            schoolData = schoolDoc.data();
            if (!schoolData.subjects) schoolData.subjects = [];
            if (!schoolData.classes) schoolData.classes = [];
        } else {
            schoolData = {
                subjects: [
                    { id: "subj_math", name: "Mathematics", code: "MATH101", category: "Core" },
                    { id: "subj_eng", name: "English", code: "ENG101", category: "Core" }
                ],
                classes: [
                    { id: "class_ss1", name: "SS1", arms: ["A", "B"] },
                    { id: "class_ss2", name: "SS2", arms: ["A", "B"] }
                ]
            };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }

        const usersSnapshot = await getDocs(collection(db, "users"));
        if (usersSnapshot.empty) {
            const adminUser = { 
                username: "admin", 
                password: "admin123", 
                role: "admin", 
                name: "System Administrator", 
                email: "admin@topelects.edu.ng" 
            };
            await addDoc(collection(db, "users"), adminUser);
        }
        setupRealtimeListeners();
    }

    function setupRealtimeListeners() {
        onSnapshot(collection(db, "teachers"), (snapshot) => {
            teachers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentUser && currentUser.role === 'teacher') {
                const teacherRecord = teachers.find(t => t.username === currentUser.username);
                if (teacherRecord) currentUser.teacherId = teacherRecord.id;
            }
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "students"), (snapshot) => {
            students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentUser && currentUser.role === 'student') {
                const studentRecord = students.find(s => s.username === currentUser.username);
                if (studentRecord) currentUser.studentId = studentRecord.id;
            }
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "results"), (snapshot) => {
            results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "teacherSubjects"), (snapshot) => {
            teacherSubjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "sessions"), (snapshot) => {
            sessions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "users"), (snapshot) => {
            users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const saved = localStorage.getItem('portal_currentUser');
            if (saved && !currentUser) {
                const parsed = JSON.parse(saved);
                const exists = users.find(u => u.id === parsed.id);
                if (exists) {
                    currentUser = exists;
                    if (currentUser.role === 'teacher') {
                        const teacherRecord = teachers.find(t => t.username === currentUser.username);
                        if (teacherRecord) currentUser.teacherId = teacherRecord.id;
                    } else if (currentUser.role === 'student') {
                        const studentRecord = students.find(s => s.username === currentUser.username);
                        if (studentRecord) currentUser.studentId = studentRecord.id;
                    }
                } else {
                    localStorage.removeItem('portal_currentUser');
                }
            }
            rerenderCurrentView();
        });
        onSnapshot(doc(db, "portal", "schoolData"), (docSnap) => {
            if (docSnap.exists()) {
                schoolData = docSnap.data();
                updateHeaderLogo();
                rerenderCurrentView();
            }
        });
    }

    function rerenderCurrentView() {
        if (!currentUser) {
            renderLogin();
        } else if (currentUser.role === 'admin') {
            renderAdminDashboard();
        } else if (currentUser.role === 'teacher') {
            renderTeacherDashboard();
        } else if (currentUser.role === 'student') {
            renderStudentDashboard();
        }
    }

    async function updateHeaderLogo() {
        const logoContainer = document.getElementById('schoolLogoContainer');
        if (!logoContainer) return;
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        const logo = schoolDoc.exists() ? schoolDoc.data().schoolLogo : null;
        if (logo) {
            logoContainer.innerHTML = `<img src="${logo}" alt="School Logo" class="school-logo">`;
        } else {
            logoContainer.innerHTML = `<span class="default-logo">🏫</span>`;
        }
    }

    // ------------------------- CRUD HELPERS -------------------------
    async function addTeacher(teacherData) {
        teacherData.name = teacherData.name.trim();
        teacherData.username = teacherData.username.trim();
        teacherData.password = teacherData.password.trim();
        if (teacherData.email) teacherData.email = teacherData.email.trim();
        if (teacherData.phone) teacherData.phone = teacherData.phone.trim();
        const teacherRef = await addDoc(collection(db, "teachers"), teacherData);
        await addDoc(collection(db, "users"), {
            username: teacherData.username,
            password: teacherData.password,
            role: "teacher",
            name: teacherData.name,
            email: teacherData.email || "",
            phone: teacherData.phone || "",
            teacherId: teacherRef.id
        });
        return teacherRef;
    }

    async function updateTeacher(teacherId, updatedData, updatedUserData = null) {
        await updateDoc(doc(db, "teachers", teacherId), updatedData);
        const teacherDoc = await getDoc(doc(db, "teachers", teacherId));
        const teacher = teacherDoc.data();
        const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
        const userSnap = await getDocs(q);
        userSnap.forEach(async (uDoc) => {
            const userUpdates = updatedUserData || { name: updatedData.name, email: updatedData.email, phone: updatedData.phone };
            if (updatedUserData) {
                await updateDoc(doc(db, "users", uDoc.id), userUpdates);
            } else {
                await updateDoc(doc(db, "users", uDoc.id), { name: updatedData.name, email: updatedData.email, phone: updatedData.phone });
            }
        });
    }

    async function deleteTeacher(id) {
        const teacherDoc = await getDoc(doc(db, "teachers", id));
        if (teacherDoc.exists()) {
            const teacher = teacherDoc.data();
            const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "teachers", id));
        const subs = teacherSubjects.filter(ts => ts.teacherId === id);
        for(let ts of subs) await deleteDoc(doc(db, "teacherSubjects", ts.id));
    }

    async function addStudent(studentData) {
        studentData.name = studentData.name.trim();
        studentData.admissionNo = studentData.admissionNo.trim();
        studentData.class = studentData.class.trim();
        studentData.username = studentData.username.trim();
        studentData.password = studentData.password.trim();
        if (studentData.parentEmail) studentData.parentEmail = studentData.parentEmail.trim();
        const studentRef = await addDoc(collection(db, "students"), studentData);
        await addDoc(collection(db, "users"), {
            username: studentData.username,
            password: studentData.password,
            role: "student",
            name: studentData.name,
            admissionNo: studentData.admissionNo,
            studentId: studentRef.id
        });
        return studentRef;
    }

    async function updateStudent(studentId, updatedData, updatedUserData = null) {
        await updateDoc(doc(db, "students", studentId), updatedData);
        const studentDoc = await getDoc(doc(db, "students", studentId));
        const student = studentDoc.data();
        const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
        const userSnap = await getDocs(q);
        userSnap.forEach(async (uDoc) => {
            const userUpdates = updatedUserData || { name: updatedData.name, admissionNo: updatedData.admissionNo };
            await updateDoc(doc(db, "users", uDoc.id), userUpdates);
        });
    }

    async function deleteStudent(id) {
        const studentDoc = await getDoc(doc(db, "students", id));
        if (studentDoc.exists()) {
            const student = studentDoc.data();
            const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "students", id));
        const stdResults = results.filter(r => r.studentId === id);
        for(let r of stdResults) await deleteDoc(doc(db, "results", r.id));
    }

    async function updateSubject(subjectId, newName, newCode, newCategory) {
        const index = schoolData.subjects.findIndex(s => s.id === subjectId);
        if (index !== -1) {
            schoolData.subjects[index] = { ...schoolData.subjects[index], name: newName, code: newCode, category: newCategory };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }
    }

    async function addSubject(subject) { schoolData.subjects.push(subject); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteSubject(subjectId) { schoolData.subjects = schoolData.subjects.filter(s => s.id !== subjectId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addClass(newClass) { schoolData.classes.push(newClass); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteClass(classId) { schoolData.classes = schoolData.classes.filter(c => c.id !== classId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addArmToClass(classId, arm) { const cls = schoolData.classes.find(c => c.id === classId); if(cls && !cls.arms.includes(arm)) { cls.arms.push(arm); await setDoc(doc(db, "portal", "schoolData"), schoolData); } }
    async function assignSubjectToTeacher(teacherId, subjectId, className) { await addDoc(collection(db, "teacherSubjects"), { teacherId, subjectId, class: className }); }
    async function removeTeacherSubject(id) { await deleteDoc(doc(db, "teacherSubjects", id)); }
    async function addResult(resultData) { await addDoc(collection(db, "results"), resultData); }
    async function approveResult(id) { await updateDoc(doc(db, "results", id), { status: "approved" }); }
    async function rejectResult(id) { await updateDoc(doc(db, "results", id), { status: "rejected" }); }
    async function editResult(resultId, newScores, resultType) {
        let total, grade;
        if (resultType === 'midterm') {
            const { ca1, project, midExam } = newScores;
            total = ca1 + project + midExam;
            if (total >= 32) grade = 'A';
            else if (total >= 28) grade = 'B';
            else if (total >= 20) grade = 'C';
            else if (total >= 16) grade = 'D';
            else grade = 'F';
            await updateDoc(doc(db, "results", resultId), {
                ca1Score: ca1,
                projectScore: project,
                midExamScore: midExam,
                total: total,
                grade: grade,
                status: 'pending'
            });
        } else {
            const { ca, exam } = newScores;
            total = ca + exam;
            if (total >= 75) grade = 'A';
            else if (total >= 65) grade = 'B';
            else if (total >= 50) grade = 'C';
            else if (total >= 40) grade = 'D';
            else grade = 'F';
            await updateDoc(doc(db, "results", resultId), {
                caScore: ca,
                examScore: exam,
                total: total,
                grade: grade,
                status: 'pending'
            });
        }
    }
    async function toggleFeeStatus(studentId, currentStatus) { const newStatus = currentStatus === 'paid' ? 'unpaid' : 'paid'; await updateDoc(doc(db, "students", studentId), { feeStatus: newStatus }); }
    async function toggleResultAccess(studentId, currentAccess) { await updateDoc(doc(db, "students", studentId), { canViewResults: !currentAccess }); }
    
    async function setActiveSession(year, term) {
        for(let s of sessions) {
            await updateDoc(doc(db, "sessions", s.id), { isActive: false });
        }
        const existing = sessions.find(s => s.academicYear === year && s.term === term);
        if (existing) {
            await updateDoc(doc(db, "sessions", existing.id), { isActive: true });
        } else {
            await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: true });
        }
    }
    
    async function changeAdminPassword(adminId, newPassword) { await updateDoc(doc(db, "users", adminId), { password: newPassword }); }
    async function deleteUser(userId) { await deleteDoc(doc(db, "users", userId)); }

    // ------------------------- LOGIN -------------------------
    function renderLogin() {
        const content = `
            <div class="login-box">
                <h2>🔐 Result Portal Login</h2>
                <div id="loginAlert"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="loginRole">
                        <option value="admin">Admin</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student/Parent</option>
                    </select>
                </div>
                <button onclick="window.handleLogin()" style="width: 100%">Login</button>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
    }

    window.handleLogin = async function() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

            }

            rerenderCurrentView();
        } else {
            showAlert('loginAlert', '❌ Invalid credentials', 'error');

    window.submitMidTermResult = async function() {
        const assignmentId = document.getElementById('midAssignmentSelect')?.value;
        const studentId = document.getElementById('midStudentSelect')?.value;
        const ca1 = parseInt(document.getElementById('ca1Score')?.value || '0');
        const project = parseInt(document.getElementById('projectScore')?.value || '0');
        const midExam = parseInt(document.getElementById('midExamScore')?.value || '0');

        if (!assignmentId || !studentId) { showAlert('scoreAlert', 'Select subject and student', 'error'); return; }
        if (ca1 < 0 || ca1 > 10 || project < 0 || project > 10 || midExam < 0 || midExam > 30) {
            showAlert('scoreAlert', 'CA1 must be 0-10, Project 0-10, Mid Exam 0-30', 'error');
            return;
        }
        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        const student = students.find(s => s.id === studentId);
        if (!assignment || !student) { showAlert('scoreAlert', 'Invalid selection', 'error'); return; }
        const subject = schoolData.subjects.find(s => s.id === assignment.subjectId);
        const total = ca1 + project + midExam;
        let grade = 'F';
        if (total >= 32) grade = 'A';
        else if (total >= 28) grade = 'B';
        else if (total >= 20) grade = 'C';
        else if (total >= 16) grade = 'D';
        else grade = 'F';
        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        const newResult = {
            studentId: student.id, studentName: student.name, admissionNo: student.admissionNo,
            subjectId: subject.id, subject: subject.name, class: student.class,
            term: activeSession.term, academicYear: activeSession.academicYear,
            resultType: 'midterm',
            ca1Score: ca1, projectScore: project, midExamScore: midExam,
            total: total, grade: grade, status: 'pending',
            teacherId: currentUser.teacherId, teacher: currentUser.name || currentUser.username,
            timestamp: new Date().toISOString()
        };
        const existing = results.find(r => r.studentId === student.id && r.subjectId === subject.id && r.term === activeSession.term && r.academicYear === activeSession.academicYear && r.resultType === 'midterm');
        if (existing) { showAlert('scoreAlert', 'Mid Term result already exists for this student/subject/term', 'error'); return; }
        await addResult(newResult);
        showAlert('scoreAlert', 'Mid Term result submitted! Pending approval.', 'success');
        document.getElementById('ca1Score').value = 0;
        document.getElementById('projectScore').value = 0;
        document.getElementById('midExamScore').value = 0;
        document.getElementById('midStudentSelect').value = '';
    };

    window.submitFinalResult = async function() {
        const assignmentId = document.getElementById('finalAssignmentSelect')?.value;
        const studentId = document.getElementById('finalStudentSelect')?.value;
        const ca = parseInt(document.getElementById('caScore')?.value || '0');
        const exam = parseInt(document.getElementById('examScore')?.value || '0');

        if (!assignmentId || !studentId) { showAlert('finalAlert', 'Select subject and student', 'error'); return; }
        if (ca < 0 || ca > 40 || exam < 0 || exam > 60) { showAlert('finalAlert', 'CA must be 0-40, Exam 0-60', 'error'); return; }
        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        const student = students.find(s => s.id === studentId);
        if (!assignment || !student) { showAlert('finalAlert', 'Invalid selection', 'error'); return; }
        const subject = schoolData.subjects.find(s => s.id === assignment.subjectId);
        const total = ca + exam;
        let grade = 'F';
        if (total >= 75) grade = 'A';
        else if (total >= 65) grade = 'B';
        else if (total >= 50) grade = 'C';
        else if (total >= 40) grade = 'D';
        else grade = 'F';
        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        const newResult = {
            studentId: student.id, studentName: student.name, admissionNo: student.admissionNo,
            subjectId: subject.id, subject: subject.name, class: student.class,
            term: activeSession.term, academicYear: activeSession.academicYear,
            resultType: 'final',
            caScore: ca, examScore: exam,
            total: total, grade: grade, status: 'pending',
            teacherId: currentUser.teacherId, teacher: currentUser.name || currentUser.username,
            timestamp: new Date().toISOString()
        };
        const existing = results.find(r => r.studentId === student.id && r.subjectId === subject.id && r.term === activeSession.term && r.academicYear === activeSession.academicYear && r.resultType === 'final');
        if (existing) { showAlert('finalAlert', 'Final Exam result already exists for this student/subject/term', 'error'); return; }
        await addResult(newResult);
        showAlert('finalAlert', 'Final Exam result submitted! Pending approval.', 'success');
        document.getElementById('caScore').value = 0;

        document.getElementById('finalStudentSelect').value = '';

        }
        else if (section === 'feeManagement') {
            container.innerHTML = `<div class="card"><h3>💰 Fee Management</h3><tr><thead><tr><th>Student</th><th>Class</th><th>Fee Status</th><th>Result Access</th><th>Actions</th></tr></thead><tbody>${students.map(s => `<tr><td>${s.name}</td><td>${s.class}</td><td class="${s.feeStatus === 'paid' ? 'fee-paid' : 'fee-unpaid'}">${s.feeStatus}</td><td>${s.canViewResults ? '✅ Can View' : '❌ Blocked'}</td><td><button onclick="window.toggleFee('${s.id}', '${s.feeStatus}')">Toggle Fee</button> <button onclick="window.toggleAccess('${s.id}', ${s.canViewResults})">Toggle Access</button></td></tr>`).join('')}</tbody></table></div>`;
        }
        else if (section === 'teacherSubjects') {
            container.innerHTML = `<div class="card"><h3>Assign Subject</h3><select id="asTeacher">${teachers.map(t => `<option value="${t.id}">${t.name}</option>`)}</select><select id="asSubject">${schoolData.subjects.map(s => `<option value="${s.id}">${s.name}</option>`)}</select><select id="asClass">${schoolData.classes.flatMap(c => c.arms.map(arm => `<option value="${c.name} ${arm}">${c.name} ${arm}</option>`)).join('')}</select><button onclick="window.assignSubject()">Assign</button></div>
            <div class="card"><h3>Assignments</h3><table><thead><tr><th>Teacher</th><th>Subject</th><th>Class</th><th>Action</th></tr></thead><tbody>${teacherSubjects.map(ts => { const t = teachers.find(t => t.id === ts.teacherId); const s = schoolData.subjects.find(s => s.id === ts.subjectId); return `<tr><td>${t?.name}</td><td>${s?.name}</td><td>${ts.class}</td><td><button onclick="window.removeTeacherSubject('${ts.id}')">Remove</button></td></tr>`; }).join('')}</tbody></table></div>`;
        }
        else if (section === 'classes') {
            container.innerHTML = `<div class="card"><h3>Manage Classes</h3><input id="className" placeholder="Class Name"><input id="classArms" placeholder="Arms (comma)"><button onclick="window.addClass()">Add Class</button></div><div>${schoolData.classes.map(c => `<div><strong>${c.name}</strong> Arms: ${c.arms.join(', ')} <button onclick="window.addArm('${c.id}')">Add Arm</button> <button onclick="window.deleteClass('${c.id}')">Delete Class</button></div>`).join('')}</div>`;
        }
        else if (section === 'sessions') {
            container.innerHTML = `
                <div class="card"><h3>📅 Add New Session</h3><div class="grid-2"><input type="text" id="newSessionYear" placeholder="Academic Year (e.g., 2025/2026)"><select id="newSessionTerm"><option>First Term</option><option>Second Term</option><option>Third Term</option></select></div><button onclick="window.addNewSession()">Add Session</button></div>
                <div class="card"><h3>📜 Session History</h3>${sessions.length === 0 ? '<p>No sessions created yet.</p>' : `<table><thead><tr><th>Academic Year</th><th>Term</th><th>Status</th><th>Action</th></tr></thead><tbody>${sessions.map(s => `<tr><td>${s.academicYear}</td><td>${s.term}</td><td>${s.isActive ? '✅ Active' : 'Inactive'}</td><td>${!s.isActive ? `<button onclick="window.setAsActive('${s.id}', '${s.academicYear}', '${s.term}')">Set as Active</button>` : 'Current'}</td></tr>`).join('')}</tbody></table>`}</div>`;
        }
        else if (section === 'reports') {
            const approved = results.filter(r => r.status === 'approved');
            const classAvg = {};
            students.forEach(s => { const stuRes = approved.filter(r => r.studentId === s.id); const avg = stuRes.length ? stuRes.reduce((a,b)=>a+b.total,0)/stuRes.length : 0; if(!classAvg[s.class]) classAvg[s.class] = { sum:0, count:0 }; classAvg[s.class].sum += avg; classAvg[s.class].count++; });
            container.innerHTML = `<div class="card"><h3>Class Performance</h3><table><thead><tr><th>Class</th><th>Average Score</th><th>Students</th><th>Performance</th></tr></thead><tbody>${Object.entries(classAvg).map(([cn,st]) => { const avg = st.sum/st.count; let perf = avg >= 70 ? 'Excellent' : avg >= 50 ? 'Good' : 'Fair'; return `<tr><td>${cn}</td><td>${avg.toFixed(1)}%</td><td>${st.count}</td><td>${perf}</td>`; }).join('')}</tbody></table></div><div class="card"><h3>Fee Defaulters</h3><table><thead><tr><th>Name</th><th>Admission</th><th>Class</th><th>Contact</th><th>Status</th></tr></thead><tbody>${students.filter(s => s.feeStatus !== 'paid').map(s => `<tr><td>${s.name}</td><td>${s.admissionNo}</td><td>${s.class}</td><td>${s.parentEmail}</td><td class="fee-unpaid">Unpaid</td>`).join('')}</tbody></table></div>`;
        }
    };

    // Edit handlers
    window.editTeacher = function(teacherId) {
        const teacher = teachers.find(t => t.id === teacherId);
        if (!teacher) return;
        showModal('Edit Teacher', `
            <label>Name</label><input type="text" id="editName" value="${teacher.name}">
            <label>Username</label><input type="text" id="editUsername" value="${teacher.username}">
            <label>Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep unchanged">
            <label>Email</label><input type="email" id="editEmail" value="${teacher.email || ''}">
            <label>Phone</label><input type="text" id="editPhone" value="${teacher.phone || ''}">
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newUsername = document.getElementById('editUsername').value.trim();
            const newPassword = document.getElementById('editPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            if (!newName || !newUsername) { alert('Name and Username are required'); return; }
            const teacherUpdate = { name: newName, email: newEmail, phone: newPhone };
            if (newUsername !== teacher.username) teacherUpdate.username = newUsername;
            await updateDoc(doc(db, "teachers", teacherId), teacherUpdate);
            const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (uDoc) => {
                const userUpdate = { name: newName, email: newEmail, phone: newPhone };
                if (newUsername !== teacher.username) userUpdate.username = newUsername;
                if (newPassword) userUpdate.password = newPassword;
                await updateDoc(doc(db, "users", uDoc.id), userUpdate);
            });
            showAdminSection('teachers');
        });
    };

    window.editStudent = function(studentId) {
        const student = students.find(s => s.id === studentId);
        if (!student) return;
        showModal('Edit Student', `
            <label>Name</label><input type="text" id="editName" value="${student.name}">
            <label>Admission No</label><input type="text" id="editAdm" value="${student.admissionNo}">
            <label>Username</label><input type="text" id="editUsername" value="${student.username}">
            <label>Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep unchanged">
            <label>Parent Email</label><input type="email" id="editEmail" value="${student.parentEmail || ''}">
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newAdm = document.getElementById('editAdm').value.trim();
            const newUsername = document.getElementById('editUsername').value.trim();
            const newPassword = document.getElementById('editPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            if (!newName || !newAdm || !newUsername) { alert('Name, Admission No, and Username are required'); return; }
            const studentUpdate = { name: newName, admissionNo: newAdm, parentEmail: newEmail };
            if (newUsername !== student.username) studentUpdate.username = newUsername;
            await updateDoc(doc(db, "students", studentId), studentUpdate);
            const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (uDoc) => {
                const userUpdate = { name: newName, admissionNo: newAdm };
                if (newUsername !== student.username) userUpdate.username = newUsername;
                if (newPassword) userUpdate.password = newPassword;
                await updateDoc(doc(db, "users", uDoc.id), userUpdate);
            });
            showAdminSection('students');
        });
    };

    window.editSubject = function(subjectId) {
        const subject = schoolData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        showModal('Edit Subject', `
            <label>Subject Name</label><input type="text" id="editName" value="${subject.name}">
            <label>Code</label><input type="text" id="editCode" value="${subject.code}">
            <label>Category</label><select id="editCat">${['Core','Science','Commercial','Arts','Elective'].map(cat => `<option value="${cat}" ${subject.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}</select>
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newCode = document.getElementById('editCode').value.trim();
            const newCat = document.getElementById('editCat').value;
            if (newName && newCode) {
                await updateSubject(subjectId, newName, newCode, newCat);
                showAdminSection('subjects');
            }
        });
    };

    window.editResultModal = function(resultId, resultType, scores) {
        let bodyHtml = '';
        if (resultType === 'midterm') {
            bodyHtml = `
                <label>CA1 (0-10)</label><input type="number" id="editCa1" min="0" max="10" value="${scores.ca1}">
                <label>Project (0-10)</label><input type="number" id="editProject" min="0" max="10" value="${scores.project}">
                <label>Mid Exam (0-30)</label><input type="number" id="editMidExam" min="0" max="30" value="${scores.midExam}">
            `;
        } else {
            bodyHtml = `
                <label>CA (0-40)</label><input type="number" id="editCa" min="0" max="40" value="${scores.ca}">
                <label>Exam (0-60)</label><input type="number" id="editExam" min="0" max="60" value="${scores.exam}">
            `;
        }
        showModal('Edit Result (will become pending)', bodyHtml, async () => {
            if (resultType === 'midterm') {
                const ca1 = parseInt(document.getElementById('editCa1').value);
                const project = parseInt(document.getElementById('editProject').value);
                const midExam = parseInt(document.getElementById('editMidExam').value);
                if (isNaN(ca1) || isNaN(project) || isNaN(midExam) || ca1<0 || ca1>10 || project<0 || project>10 || midExam<0 || midExam>30) {
                    alert('Invalid scores for Mid Term');
                    return;
                }
                await editResult(resultId, { ca1, project, midExam }, 'midterm');
            } else {
                const ca = parseInt(document.getElementById('editCa').value);
                const exam = parseInt(document.getElementById('editExam').value);
                if (isNaN(ca) || isNaN(exam) || ca<0 || ca>40 || exam<0 || exam>60) {
                    alert('Invalid scores for Final Exam');
                    return;
                }
                await editResult(resultId, { ca, exam }, 'final');
            }
            showAdminSection('allResults');
        });
    };

    window.withdrawResult = async function(resultId) {
        if (confirm('Withdraw this approved result? It will be set to "pending" and require re-approval.')) {
            await updateDoc(doc(db, "results", resultId), { status: 'pending' });
            showAdminSection('allResults');
        }
    };

    // Other admin actions
    window.addTeacher = async () => { const name=document.getElementById('tName')?.value.trim(), user=document.getElementById('tUser')?.value.trim(), pass=document.getElementById('tPass')?.value.trim(); if(name&&user&&pass) { await addTeacher({ name, username: user, password: pass, email: document.getElementById('tEmail')?.value.trim(), phone: document.getElementById('tPhone')?.value.trim() }); showAdminSection('teachers'); alert(`Teacher ${user} added.`); } else alert('Fill required fields'); };
    window.deleteTeacher = async (id) => { if(confirm('Delete teacher?')) await deleteTeacher(id); showAdminSection('teachers'); };
    window.addStudent = async () => { const name=document.getElementById('sName')?.value.trim(), adm=document.getElementById('sAdm')?.value.trim(), cls=document.getElementById('sClass')?.value, user=document.getElementById('sUser')?.value.trim(), pass=document.getElementById('sPass')?.value.trim(); if(name&&adm&&cls&&user&&pass) { await addStudent({ name, admissionNo: adm, class: cls, username: user, password: pass, parentEmail: document.getElementById('sParentEmail')?.value.trim(), feeStatus: 'unpaid', canViewResults: false }); showAdminSection('students'); alert(`Student ${user} added.`); } else alert('Fill required fields'); };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteStudent(id); showAdminSection('students'); };
    window.toggleFee = async (id, status) => { await toggleFeeStatus(id, status); showAdminSection('feeManagement'); };
    window.toggleAccess = async (id, curr) => { await toggleResultAccess(id, curr); showAdminSection('feeManagement'); };
    window.approveResult = async (id) => { await approveResult(id); showAdminSection('resultApproval'); };
    window.rejectResult = async (id) => { await rejectResult(id); showAdminSection('resultApproval'); };
    window.addSubject = async () => { const name=document.getElementById('subjName')?.value.trim(), code=document.getElementById('subjCode')?.value.trim(), cat=document.getElementById('subjCat')?.value; if(name&&code) { await addSubject({ id: 'subj_'+Date.now(), name, code, category: cat }); showAdminSection('subjects'); } };
    window.deleteSubject = async (id) => { if(confirm('Delete subject?')) await deleteSubject(id); showAdminSection('subjects'); };
    window.addClass = async () => { const name=document.getElementById('className')?.value.trim(), arms=document.getElementById('classArms')?.value; if(name&&arms) { await addClass({ id: 'class_'+Date.now(), name, arms: arms.split(',').map(a=>a.trim()) }); showAdminSection('classes'); } };
    window.deleteClass = async (id) => { if(confirm('Delete class?')) await deleteClass(id); showAdminSection('classes'); };
    window.addArm = async (id) => { const arm=prompt('Enter arm name'); if(arm) await addArmToClass(id, arm.trim()); showAdminSection('classes'); };
    window.assignSubject = async () => { const tid=document.getElementById('asTeacher')?.value, sid=document.getElementById('asSubject')?.value, cls=document.getElementById('asClass')?.value; if(tid&&sid&&cls) { await assignSubjectToTeacher(tid, sid, cls); showAdminSection('teacherSubjects'); } };
    window.removeTeacherSubject = async (id) => { await removeTeacherSubject(id); showAdminSection('teacherSubjects'); };
    window.addNewSession = async () => { const year = document.getElementById('newSessionYear')?.value.trim(); const term = document.getElementById('newSessionTerm')?.value; if(!year) { alert('Enter academic year'); return; } const exists = sessions.find(s => s.academicYear === year && s.term === term); if(exists) { alert('Session already exists. Use "Set as Active" from the list.'); return; } await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: false }); showAdminSection('sessions'); };
    window.setAsActive = async function(sessionId, year, term) { if(confirm(`Set ${term} ${year} as the active session?`)) { for(let s of sessions) { await updateDoc(doc(db, "sessions", s.id), { isActive: false }); } await updateDoc(doc(db, "sessions", sessionId), { isActive: true }); showAdminSection('sessions'); } };
    window.searchResults = () => { const term = document.getElementById('searchRes')?.value.toLowerCase(); if(term && document.getElementById('resTable')) { const filtered = results.filter(r => r.studentName.toLowerCase().includes(term) || r.subject.toLowerCase().includes(term)); document.getElementById('resTable').innerHTML = `<table><thead><tr><th>Type</th><th>Student</th><th>Subject</th><th>Class</th><th>Scores</th><th>Total</th><th>Grade</th><th>Status</th><th>Actions</th></tr></thead><tbody>${filtered.map(r => { let scoresDisplay = ''; if (r.resultType === 'midterm') { scoresDisplay = `CA1:${r.ca1Score}, Proj:${r.projectScore}, MidExam:${r.midExamScore}`; } else { scoresDisplay = `CA:${r.caScore}, Exam:${r.examScore}`; } return `<tr><td><span class="result-type-badge ${r.resultType === 'midterm' ? 'result-type-midterm' : 'result-type-final'}">${r.resultType === 'midterm' ? 'Mid Term' : 'Final Exam'}</span></td><td>${r.studentName}</td><td>${r.subject}</td><td>${r.class}</td><td>${scoresDisplay}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td><td class="${r.status}">${r.status}</td><td><button onclick="window.editResultModal('${r.id}', '${r.resultType}', ${r.resultType === 'midterm' ? `{ca1:${r.ca1Score}, project:${r.projectScore}, midExam:${r.midExamScore}}` : `{ca:${r.caScore}, exam:${r.examScore}}`})">Edit</button> ${r.status === 'approved' ? `<button onclick="window.withdrawResult('${r.id}')">Withdraw</button>` : ''}</td>`; }).join('')}</tbody></table>`; } };
    window.deleteUserAccount = async (userId) => { if(confirm('Delete user?')) { const user=users.find(u=>u.id===userId); if(user&&user.role==='teacher') { const teacher=teachers.find(t=>t.username===user.username); if(teacher) await deleteTeacher(teacher.id); } else if(user&&user.role==='student') { const student=students.find(s=>s.username===user.username); if(student) await deleteStudent(student.id); } else { await deleteDoc(doc(db,"users",userId)); } showAdminSection('users'); } };
    window.showChangePassword = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>🔐 Change Admin Password</h3><div id="pwdAlert"></div><div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div><div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div><div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword"></div><button onclick="window.updateAdminPassword()">Update</button></div>`; };
    window.updateAdminPassword = async () => { const old=document.getElementById('currentPassword')?.value.trim(), newp=document.getElementById('newPassword')?.value.trim(), conf=document.getElementById('confirmPassword')?.value.trim(); if(!currentUser||currentUser.role!=='admin'){showAlert('pwdAlert','Not authorized','error');return;} const adminUser=users.find(u=>u.id===currentUser.id); if(adminUser.password!==old){showAlert('pwdAlert','Current password wrong','error');return;} if(newp!==conf||newp.length<4){showAlert('pwdAlert','Mismatch or too short','error');return;} await changeAdminPassword(currentUser.id,newp); showAlert('pwdAlert','Password changed! Login again.','success'); setTimeout(()=>logout(),1500); };
    window.showUploadLogo = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>🏫 Upload Logo</h3><div id="logoAlert"></div><div class="logo-upload-preview" id="logoPreview"><span>🏫</span></div><input type="file" id="logoFile" accept="image/*"><button onclick="window.uploadLogo()">Upload</button><button onclick="window.removeLogo()">Remove</button></div>`; const input=document.getElementById('logoFile'); if(input) input.onchange=(e)=>{const file=e.target.files[0]; if(file){const reader=new FileReader(); reader.onload=(ev)=>{const prev=document.getElementById('logoPreview'); if(prev) prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;}; reader.readAsDataURL(file);}}; };
    window.uploadLogo = async () => { const file=document.getElementById('logoFile')?.files[0]; if(file){const reader=new FileReader(); reader.onload=async(e)=>{await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:e.target.result}); showAlert('logoAlert','Logo uploaded!','success'); setTimeout(()=>showAdminSection('dashboard'),1000);}; reader.readAsDataURL(file);}};
    window.removeLogo = async () => { await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:null}); showAlert('logoAlert','Logo removed','success'); setTimeout(()=>showAdminSection('dashboard'),1000); };

    // ------------------------- STUDENT DASHBOARD -------------------------
    function renderStudentDashboard() {
        const student = students.find(s => s.username === currentUser?.username);
        const activeSession = sessions.find(s => s.isActive) || { academicYear: 'N/A', term: 'No active session' };
        if (student && student.canViewResults === false) {
            document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>Access Restricted</h3><p>Please contact school administration.</p></div></div>`;
            return;
        }
        const myMidtermResults = results.filter(r => r.studentId === student?.id && r.status === 'approved' && r.resultType === 'midterm');
        const myFinalResults = results.filter(r => r.studentId === student?.id && r.status === 'approved' && r.resultType === 'final');
        document.getElementById('content').innerHTML = `
            <div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div>
            <div class="main-content">
                <div class="card"><h3>Welcome, ${student?.name}</h3><p><strong>📅 Active Session: ${activeSession.term} ${activeSession.academicYear}</strong></p></div>
                <div class="card"><h3>📘 Mid Term Results (Total 40)</h3>${myMidtermResults.length === 0 ? '<p>No approved Mid Term results yet.</p>' : `<table><thead><tr><th>Subject</th><th>Class</th><th>CA1 (10)</th><th>Project (10)</th><th>Mid Exam (30)</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myMidtermResults.map(r => `<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.ca1Score}</td><td>${r.projectScore}</td><td>${r.midExamScore}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td>`).join('')}</tbody></table>`}</div>
                <div class="card"><h3>📗 Final Exam Results (Total 100)</h3>${myFinalResults.length === 0 ? '<p>No approved Final Exam results yet.</p>' : `<td><thead><tr><th>Subject</th><th>Class</th><th>CA (40)</th><th>Exam (60)</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myFinalResults.map(r => `<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.caScore}</td><td>${r.examScore}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td>`).join('')}</tbody></table>`}</div>
            </div>
        `;
    }

    // ------------------------- START APPLICATION -------------------------
    const savedUser = localStorage.getItem('portal_currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
    }
    await loadInitialData();
    if (currentUser && !users.find(u => u.id === currentUser.id)) {
        currentUser = null;
        localStorage.removeItem('portal_currentUser');
    } else if (currentUser && currentUser.role === 'teacher') {
        const teacherRecord = teachers.find(t => t.username === currentUser.username);
        if (teacherRecord) currentUser.teacherId = teacherRecord.id;
    }
    rerenderCurrentView();
    updateHeaderLogo();
</script>
</body>
</html>
