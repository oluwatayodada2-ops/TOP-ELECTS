<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TOP-ELECTS COLLEGE - Real-Time Result Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .school-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .school-logo .default-logo {
            font-size: 42px;
        }

        .header-text h1 {
            font-size: 2em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .header-text p {
            font-size: 1em;
            opacity: 0.9;
            font-style: italic;
        }

        .nav {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        .nav .logout-btn {
            background: #dc3545;
            margin-left: auto;
        }

        .nav .logout-btn:hover {
            background: #c82333;
        }

        .main-content {
            padding: 30px;
            min-height: 500px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }

        button {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #2a5298;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
        }

        .grid-2, .grid-3, .grid-4 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .login-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }

        .status-approved { color: green; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .fee-paid { color: green; font-weight: bold; }
        .fee-unpaid { color: red; font-weight: bold; }

        .logo-upload-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #1e3c72;
        }
        .logo-upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .nav button { font-size: 12px; padding: 8px 12px; }
            .header { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="school-logo" id="schoolLogoContainer">
            <span class="default-logo">🏫</span>
        </div>
        <div class="header-text">
            <h1>TOP-ELECTS COLLEGE</h1>
            <p>Real-Time Result Portal</p>
        </div>
    </div>
    <div id="content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, 
        doc, getDoc, setDoc, updateDoc,
        collection, getDocs, addDoc, deleteDoc, query, where, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC4211tsKyps-6VaAhmWzqQcua9bA4bYFY",
        authDomain: "anyportal-4faa1.firebaseapp.com",
        projectId: "anyportal-4faa1",
        storageBucket: "anyportal-4faa1.firebasestorage.app",
        messagingSenderId: "529610323405",
        appId: "1:529610323405:web:049d47c1671c5213c1c084"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ------------------------- GLOBAL STATE & LISTENERS -------------------------
    let currentUser = null;           // { id, username, role, name }
    let currentView = 'dashboard';    // for admin/teacher sections
    let unsubscribeAdmin = null;
    let unsubscribeTeacher = null;
    let unsubscribeStudent = null;
    
    // Real-time data stores (kept in memory)
    let schoolData = { subjects: [], classes: [] };
    let teachers = [];
    let students = [];
    let results = [];
    let teacherSubjects = [];
    let sessions = [];
    let users = [];

    // Helper: show alert message inside a container
    function showAlert(containerId, message, type = 'error') {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => { if (container) container.innerHTML = ''; }, 3000);
    }

    // ------------------------- FIREBASE DATA OPS (SYNC) -------------------------
    async function loadInitialData() {
        // School metadata
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        if (schoolDoc.exists()) {
            schoolData = schoolDoc.data();
            if (!schoolData.subjects) schoolData.subjects = [];
            if (!schoolData.classes) schoolData.classes = [];
        } else {
            schoolData = {
                subjects: [
                    { id: "subj_math", name: "Mathematics", code: "MATH101", category: "Core" },
                    { id: "subj_eng", name: "English", code: "ENG101", category: "Core" }
                ],
                classes: [
                    { id: "class_ss1", name: "SS1", arms: ["A", "B"] },
                    { id: "class_ss2", name: "SS2", arms: ["A", "B"] }
                ]
            };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }

        // Users collection (ensure admin exists)
        const usersSnapshot = await getDocs(collection(db, "users"));
        if (usersSnapshot.empty) {
            const adminUser = { 
                id: "admin1", username: "admin", password: "admin123", role: "admin", 
                name: "System Administrator", email: "admin@topelects.edu.ng" 
            };
            await addDoc(collection(db, "users"), adminUser);
        }
        
        // Start real-time listeners for all collections
        setupRealtimeListeners();
    }

    function setupRealtimeListeners() {
        // Teachers
        onSnapshot(collection(db, "teachers"), (snapshot) => {
            teachers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentUser && ((currentUser.role === 'admin' && currentView) || currentUser.role === 'teacher')) rerenderCurrentView();
        });
        // Students
        onSnapshot(collection(db, "students"), (snapshot) => {
            students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        // Results
        onSnapshot(collection(db, "results"), (snapshot) => {
            results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        // TeacherSubjects
        onSnapshot(collection(db, "teacherSubjects"), (snapshot) => {
            teacherSubjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        // Sessions
        onSnapshot(collection(db, "sessions"), (snapshot) => {
            sessions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        // Users (for admin change password)
        onSnapshot(collection(db, "users"), (snapshot) => {
            users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentUser && currentUser.role === 'admin') rerenderCurrentView();
        });
        // School logo updates
        onSnapshot(doc(db, "portal", "schoolData"), (docSnap) => {
            if (docSnap.exists()) {
                schoolData = docSnap.data();
                updateHeaderLogo();
                rerenderCurrentView();
            }
        });
    }

    function rerenderCurrentView() {
        if (!currentUser) renderLogin();
        else if (currentUser.role === 'admin') renderAdminDashboard();
        else if (currentUser.role === 'teacher') renderTeacherDashboard();
        else if (currentUser.role === 'student') renderStudentDashboard();
    }

    // Logo functions
    async function updateHeaderLogo() {
        const logoContainer = document.getElementById('schoolLogoContainer');
        if (!logoContainer) return;
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        const logo = schoolDoc.exists() ? schoolDoc.data().schoolLogo : null;
        if (logo) {
            logoContainer.innerHTML = `<img src="${logo}" alt="School Logo" class="school-logo">`;
        } else {
            logoContainer.innerHTML = `<span class="default-logo">🏫</span>`;
        }
    }

    async function setSchoolLogo(base64) {
        await updateDoc(doc(db, "portal", "schoolData"), { schoolLogo: base64 });
    }
    async function removeSchoolLogo() {
        await updateDoc(doc(db, "portal", "schoolData"), { schoolLogo: null });
    }

    // ------------------------- CRUD HELPERS (Firestore) -------------------------
    async function addTeacher(teacherData) { await addDoc(collection(db, "teachers"), teacherData); }
    async function deleteTeacher(id) { await deleteDoc(doc(db, "teachers", id)); const subs = teacherSubjects.filter(ts => ts.teacherId === id); for(let ts of subs) await deleteDoc(doc(db, "teacherSubjects", ts.id)); }
    async function addStudent(studentData) { await addDoc(collection(db, "students"), studentData); }
    async function deleteStudent(id) { await deleteDoc(doc(db, "students", id)); const stdResults = results.filter(r => r.studentId === id); for(let r of stdResults) await deleteDoc(doc(db, "results", r.id)); }
    async function addSubject(subject) { schoolData.subjects.push(subject); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteSubject(subjectId) { schoolData.subjects = schoolData.subjects.filter(s => s.id !== subjectId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addClass(newClass) { schoolData.classes.push(newClass); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteClass(classId) { schoolData.classes = schoolData.classes.filter(c => c.id !== classId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addArmToClass(classId, arm) { const cls = schoolData.classes.find(c => c.id === classId); if(cls && !cls.arms.includes(arm)) { cls.arms.push(arm); await setDoc(doc(db, "portal", "schoolData"), schoolData); } }
    async function assignSubjectToTeacher(teacherId, subjectId, className) { await addDoc(collection(db, "teacherSubjects"), { teacherId, subjectId, class: className }); }
    async function removeTeacherSubject(id) { await deleteDoc(doc(db, "teacherSubjects", id)); }
    async function addResult(resultData) { await addDoc(collection(db, "results"), resultData); }
    async function approveResult(id) { await updateDoc(doc(db, "results", id), { status: "approved" }); }
    async function rejectResult(id) { await updateDoc(doc(db, "results", id), { status: "rejected" }); }
    async function toggleFeeStatus(studentId, currentStatus) { const newStatus = currentStatus === 'paid' ? 'unpaid' : 'paid'; await updateDoc(doc(db, "students", studentId), { feeStatus: newStatus }); }
    async function toggleResultAccess(studentId, currentAccess) { await updateDoc(doc(db, "students", studentId), { canViewResults: !currentAccess }); }
    async function setActiveSession(year, term) { for(let s of sessions) { await updateDoc(doc(db, "sessions", s.id), { isActive: false }); } await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: true }); }
    async function changeAdminPassword(adminId, newPassword) { const q = query(collection(db, "users"), where("username", "==", "admin"), where("role", "==", "admin")); const snap = await getDocs(q); snap.forEach(async (docSnap) => { await updateDoc(doc(db, "users", docSnap.id), { password: newPassword }); }); }

    // ------------------------- RENDER LOGIN -------------------------
    function renderLogin() {
        document.getElementById('content').innerHTML = `
            <div class="login-box">
                <h2>🔐 Real-Time Portal Login</h2>
                <div id="loginAlert"></div>
                <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Username"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
                <div class="form-group"><label>Role</label><select id="loginRole"><option value="admin">Admin</option><option value="teacher">Teacher</option><option value="student">Student</option></select></div>
                <button onclick="window.handleLogin()" style="width:100%">Login</button>
            </div>
        `;
    }

    window.handleLogin = async function() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const role = document.getElementById('loginRole').value;
        const user = users.find(u => u.username === username && u.password === password && u.role === role);
        if (user) {
            currentUser = { id: user.id, username: user.username, role: user.role, name: user.name };
            rerenderCurrentView();
        } else {
            showAlert('loginAlert', '❌ Invalid credentials', 'error');
        }
    };

    window.logout = function() { currentUser = null; renderLogin(); };

    // ------------------------- ADMIN DASHBOARD -------------------------
    function renderAdminDashboard() {
        const pendingResults = results.filter(r => r.status === 'pending');
        const feeDefaulters = students.filter(s => s.feeStatus !== 'paid');
        const content = `
            <div class="nav">
                <button onclick="window.showAdminSection('dashboard')">📊 Dashboard</button>
                <button onclick="window.showAdminSection('subjects')">📚 Subjects</button>
                <button onclick="window.showAdminSection('teachers')">👨‍🏫 Teachers</button>
                <button onclick="window.showAdminSection('teacherSubjects')">📋 Assign Subjects</button>
                <button onclick="window.showAdminSection('students')">👨‍🎓 Students</button>
                <button onclick="window.showAdminSection('feeManagement')">💰 Fee Management</button>
                <button onclick="window.showAdminSection('resultApproval')">✅ Approve Results</button>
                <button onclick="window.showAdminSection('classes')">🏫 Classes</button>
                <button onclick="window.showAdminSection('sessions')">📅 Sessions</button>
                <button onclick="window.showAdminSection('allResults')">📖 All Results</button>
                <button onclick="window.showAdminSection('reports')">📊 Reports</button>
                <button onclick="window.showChangePassword()">🔐 Change Password</button>
                <button onclick="window.showUploadLogo()">🖼️ Upload Logo</button>
                <button class="logout-btn" onclick="window.logout()">🚪 Logout</button>
            </div>
            <div class="main-content" id="adminContent">
                <div class="stats">
                    <div class="stat-card"><h3>${teachers.length}</h3><p>Teachers</p></div>
                    <div class="stat-card"><h3>${students.length}</h3><p>Students</p></div>
                    <div class="stat-card"><h3>${pendingResults.length}</h3><p>Pending Approval</p></div>
                    <div class="stat-card"><h3>${feeDefaulters.length}</h3><p>Fee Defaulters</p></div>
                </div>
                <div class="card"><h3>📈 Quick Actions</h3><button onclick="window.showAdminSection('resultApproval')">✅ Approve Results (${pendingResults.length})</button></div>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
        showAdminSection('dashboard');
    }

    window.showAdminSection = function(section) {
        currentView = section;
        const container = document.getElementById('adminContent');
        if (!container) return;
        if (section === 'dashboard') {
            container.innerHTML = `<div class="card"><h3>Real-Time Dashboard</h3><p>All changes sync instantly across devices.</p></div>`;
        } else if (section === 'subjects') {
            container.innerHTML = `
                <div class="card"><h3>➕ Add Subject</h3><div class="grid-2"><input id="subjName" placeholder="Name"><input id="subjCode" placeholder="Code"><select id="subjCat"><option>Core</option><option>Science</option></select></div><button onclick="window.addSubject()">Add</button></div>
                <div class="card"><h3>All Subjects</h3><table><thead><tr><th>Code</th><th>Name</th><th>Action</th></tr></thead><tbody>${schoolData.subjects.map(s => `<tr><td>${s.code}</td><td>${s.name}</td><td><button onclick="window.deleteSubject('${s.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`;
        } else if (section === 'teachers') {
            container.innerHTML = `
                <div class="card"><h3>➕ Add Teacher</h3><div class="grid-3"><input id="tName" placeholder="Name"><input id="tUser" placeholder="Username"><input id="tPass" type="password" placeholder="Password"><input id="tEmail" placeholder="Email"><input id="tPhone" placeholder="Phone"></div><button onclick="window.addTeacher()">Add</button></div>
                <div class="card"><h3>Teachers List</h3><table><thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Action</th></tr></thead><tbody>${teachers.map(t => `<tr><td>${t.name}</td><td>${t.username}</td><td>${t.email || '-'}</td><td><button onclick="window.deleteTeacher('${t.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`;
        } else if (section === 'teacherSubjects') {
            container.innerHTML = `
                <div class="card"><h3>Assign Subject to Teacher</h3><select id="asTeacher">${teachers.map(t => `<option value="${t.id}">${t.name}</option>`)}</select><select id="asSubject">${schoolData.subjects.map(s => `<option value="${s.id}">${s.name}</option>`)}</select><select id="asClass">${schoolData.classes.flatMap(c => c.arms.map(arm => `<option value="${c.name} ${arm}">${c.name} ${arm}</option>`)).join('')}</select><button onclick="window.assignSubject()">Assign</button></div>
                <div class="card"><h3>Current Assignments</h3><table><thead><tr><th>Teacher</th><th>Subject</th><th>Class</th><th>Action</th></tr></thead><tbody>${teacherSubjects.map(ts => { const t = teachers.find(t => t.id === ts.teacherId); const s = schoolData.subjects.find(s => s.id === ts.subjectId); return `<tr><td>${t?.name}</td><td>${s?.name}</td><td>${ts.class}</td><td><button onclick="window.removeTeacherSubject('${ts.id}')">Remove</button></td></tr>`; }).join('')}</tbody></table></div>`;
        } else if (section === 'students') {
            container.innerHTML = `<div class="card"><h3>➕ Add Student</h3><div class="grid-3"><input id="sName" placeholder="Name"><input id="sAdm" placeholder="Admission No"><select id="sClass">${schoolData.classes.flatMap(c => c.arms.map(arm => `<option value="${c.name} ${arm}">${c.name} ${arm}</option>`)).join('')}</select><input id="sParentEmail" placeholder="Parent Email"><input id="sUser" placeholder="Username"><input id="sPass" type="password" placeholder="Password"></div><button onclick="window.addStudent()">Add</button></div>
            <div class="card"><h3>Student List</h3><table><thead><tr><th>Admission</th><th>Name</th><th>Class</th><th>Fee</th><th>Access</th><th>Action</th></tr></thead><tbody>${students.map(s => `<tr><td>${s.admissionNo}</td><td>${s.name}</td><td>${s.class}</td><td class="${s.feeStatus === 'paid' ? 'fee-paid' : 'fee-unpaid'}">${s.feeStatus}</td><td>${s.canViewResults ? 'Allowed' : 'Blocked'}</td><td><button onclick="window.deleteStudent('${s.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`;
        } else if (section === 'feeManagement') {
            container.innerHTML = `<div class="card"><h3>Fee Management</h3><table><thead><tr><th>Student</th><th>Class</th><th>Fee Status</th><th>Result Access</th><th>Actions</th></tr></thead><tbody>${students.map(s => `<tr><td>${s.name}</td><td>${s.class}</td><td class="${s.feeStatus === 'paid' ? 'fee-paid' : 'fee-unpaid'}">${s.feeStatus}</td><td>${s.canViewResults ? '✅ Can View' : '❌ Blocked'}</td><td><button onclick="window.toggleFee('${s.id}', '${s.feeStatus}')">Toggle Fee</button> <button onclick="window.toggleAccess('${s.id}', ${s.canViewResults})">Toggle Access</button></td></tr>`).join('')}</tbody></table></div>`;
        } else if (section === 'resultApproval') {
            const pending = results.filter(r => r.status === 'pending');
            container.innerHTML = `<div class="card"><h3>Pending Results (${pending.length})</h3>${pending.length === 0 ? '<p>No pending results</p>' : `<table><thead><tr><th>Student</th><th>Subject</th><th>Class</th><th>Total</th><th>Grade</th><th>Action</th></tr></thead><tbody>${pending.map(r => `<tr><td>${r.studentName}</td><td>${r.subject}</td><td>${r.class}</td><td>${r.total}</td><td>${r.grade}</td><td><button onclick="window.approveResult('${r.id}')">Approve</button> <button onclick="window.rejectResult('${r.id}')">Reject</button></td></tr>`).join('')}</tbody></table>`}</div>`;
        } else if (section === 'classes') {
            container.innerHTML = `<div class="card"><h3>Manage Classes</h3><input id="className" placeholder="Class Name"><input id="classArms" placeholder="Arms (comma)"><button onclick="window.addClass()">Add Class</button></div><div>${schoolData.classes.map(c => `<div><strong>${c.name}</strong> Arms: ${c.arms.join(', ')} <button onclick="window.addArm('${c.id}')">Add Arm</button> <button onclick="window.deleteClass('${c.id}')">Delete Class</button></div>`).join('')}</div>`;
        } else if (section === 'sessions') {
            container.innerHTML = `<div class="card"><h3>Set Active Session</h3><input id="acadYear" placeholder="2024/2025"><select id="termSel"><option>First Term</option><option>Second Term</option><option>Third Term</option></select><button onclick="window.setSession()">Activate</button></div><div class="card"><h3>Sessions</h3><table>${sessions.map(s => `<tr><td>${s.academicYear}</td><td>${s.term}</td><td>${s.isActive ? 'Active ✅' : 'Inactive'}</td></tr>`).join('')}</table></div>`;
        } else if (section === 'allResults') {
            container.innerHTML = `<div class="card"><h3>All Results</h3><input id="searchRes" placeholder="Search..." onkeyup="window.searchResults()"><div id="resTable"><table><thead><tr><th>Student</th><th>Subject</th><th>Class</th><th>Total</th><th>Status</th></tr></thead><tbody>${results.map(r => `<tr><td>${r.studentName}</td><td>${r.subject}</td><td>${r.class}</td><td>${r.total}</td><td class="${r.status === 'approved' ? 'status-approved' : 'status-pending'}">${r.status}</td></tr>`).join('')}</tbody></table></div></div>`;
        } else if (section === 'reports') {
            const approved = results.filter(r => r.status === 'approved');
            const classAvg = {};
            students.forEach(s => { const stuRes = approved.filter(r => r.studentId === s.id); const avg = stuRes.length ? stuRes.reduce((a,b)=>a+b.total,0)/stuRes.length : 0; if(!classAvg[s.class]) classAvg[s.class] = { sum:0, count:0 }; classAvg[s.class].sum += avg; classAvg[s.class].count++; });
            container.innerHTML = `<div class="card"><h3>Performance Report</h3><table><thead><tr><th>Class</th><th>Average Score</th><th>Students</th></tr></thead><tbody>${Object.entries(classAvg).map(([cls, data]) => `<tr><td>${cls}</td><td>${(data.sum/data.count).toFixed(1)}%</td><td>${data.count}</td></tr>`).join('')}</tbody></table></div>`;
        }
    };

    // Admin actions
    window.addSubject = async () => { const name = document.getElementById('subjName')?.value, code = document.getElementById('subjCode')?.value, cat = document.getElementById('subjCat')?.value; if(name && code) { await addSubject({ id: 'subj_'+Date.now(), name, code, category: cat }); showAdminSection('subjects'); } };
    window.deleteSubject = async (id) => { if(confirm('Delete subject?')) await deleteSubject(id); showAdminSection('subjects'); };
    window.addTeacher = async () => { const name = document.getElementById('tName')?.value, user = document.getElementById('tUser')?.value, pass = document.getElementById('tPass')?.value; if(name && user && pass) { await addTeacher({ name, username: user, password: pass, email: document.getElementById('tEmail')?.value, phone: document.getElementById('tPhone')?.value, role: 'teacher' }); showAdminSection('teachers'); } };
    window.deleteTeacher = async (id) => { if(confirm('Delete teacher?')) await deleteTeacher(id); showAdminSection('teachers'); };
    window.assignSubject = async () => { const tid = document.getElementById('asTeacher')?.value, sid = document.getElementById('asSubject')?.value, cls = document.getElementById('asClass')?.value; if(tid && sid && cls) { await assignSubjectToTeacher(tid, sid, cls); showAdminSection('teacherSubjects'); } };
    window.removeTeacherSubject = async (id) => { await removeTeacherSubject(id); showAdminSection('teacherSubjects'); };
    window.addStudent = async () => { const name = document.getElementById('sName')?.value, adm = document.getElementById('sAdm')?.value, cls = document.getElementById('sClass')?.value, user = document.getElementById('sUser')?.value, pass = document.getElementById('sPass')?.value; if(name && adm && cls && user && pass) { await addStudent({ name, admissionNo: adm, class: cls, username: user, password: pass, parentEmail: document.getElementById('sParentEmail')?.value, feeStatus: 'unpaid', canViewResults: false }); showAdminSection('students'); } };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteStudent(id); showAdminSection('students'); };
    window.toggleFee = async (id, status) => { await toggleFeeStatus(id, status); showAdminSection('feeManagement'); };
    window.toggleAccess = async (id, curr) => { await toggleResultAccess(id, curr); showAdminSection('feeManagement'); };
    window.approveResult = async (id) => { await approveResult(id); showAdminSection('resultApproval'); };
    window.rejectResult = async (id) => { await rejectResult(id); showAdminSection('resultApproval'); };
    window.addClass = async () => { const name = document.getElementById('className')?.value, arms = document.getElementById('classArms')?.value; if(name && arms) { await addClass({ id: 'class_'+Date.now(), name, arms: arms.split(',').map(a=>a.trim()) }); showAdminSection('classes'); } };
    window.deleteClass = async (id) => { if(confirm('Delete class?')) await deleteClass(id); showAdminSection('classes'); };
    window.addArm = async (id) => { const arm = prompt('Enter arm name'); if(arm) await addArmToClass(id, arm); showAdminSection('classes'); };
    window.setSession = async () => { const year = document.getElementById('acadYear')?.value, term = document.getElementById('termSel')?.value; if(year) await setActiveSession(year, term); showAdminSection('sessions'); };
    window.searchResults = () => { const term = document.getElementById('searchRes')?.value.toLowerCase(); if(term && document.getElementById('resTable')) { const filtered = results.filter(r => r.studentName.toLowerCase().includes(term) || r.subject.toLowerCase().includes(term)); document.getElementById('resTable').innerHTML = `<table><thead><tr><th>Student</th><th>Subject</th><th>Class</th><th>Total</th><th>Status</th></tr></thead><tbody>${filtered.map(r => `<tr><td>${r.studentName}</td><td>${r.subject}</td><td>${r.class}</td><td>${r.total}</td><td>${r.status}</td></tr>`).join('')}</tbody></table>`; } };
    window.showChangePassword = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>Change Admin Password</h3><div id="pwdAlert"></div><input type="password" id="oldPass" placeholder="Current Password"><input type="password" id="newPass" placeholder="New Password"><input type="password" id="confirmPass" placeholder="Confirm"><button onclick="window.updateAdminPassword()">Update</button></div>`; };
    window.updateAdminPassword = async () => { const old = document.getElementById('oldPass')?.value, newp = document.getElementById('newPass')?.value, conf = document.getElementById('confirmPass')?.value; const adminUser = users.find(u => u.username === 'admin' && u.role === 'admin'); if(!adminUser || adminUser.password !== old) { showAlert('pwdAlert', 'Current password wrong', 'error'); return; } if(newp !== conf || newp.length < 4) { showAlert('pwdAlert', 'Passwords mismatch or too short', 'error'); return; } await changeAdminPassword(adminUser.id, newp); showAlert('pwdAlert', 'Password changed! Please login again.', 'success'); setTimeout(() => logout(), 1500); };
    window.showUploadLogo = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>Upload Logo</h3><div id="logoAlert"></div><div class="logo-upload-preview" id="logoPreview"><span>🏫</span></div><input type="file" id="logoFile" accept="image/*"><button onclick="window.uploadLogo()">Upload</button><button onclick="window.removeLogo()">Remove</button></div>`; const input = document.getElementById('logoFile'); if(input) input.onchange = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (ev) => { const prev = document.getElementById('logoPreview'); if(prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`; }; reader.readAsDataURL(file); } }; };
    window.uploadLogo = async () => { const file = document.getElementById('logoFile')?.files[0]; if(file) { const reader = new FileReader(); reader.onload = async (e) => { await setSchoolLogo(e.target.result); showAlert('logoAlert', 'Logo updated!', 'success'); setTimeout(()=>showAdminSection('dashboard'), 1000); }; reader.readAsDataURL(file); } };
    window.removeLogo = async () => { await removeSchoolLogo(); showAlert('logoAlert', 'Logo removed', 'success'); setTimeout(()=>showAdminSection('dashboard'), 1000); };

    // Teacher & Student simplified (keep functionality but core sync works)
    function renderTeacherDashboard() { document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>Teacher Panel (Sync Active)</h3><p>Results you submit go to admin approval. Real-time updates enabled.</p><button onclick="alert('Use console or extend teacher UI')">Enter Scores</button></div></div>`; }
    function renderStudentDashboard() { const student = students.find(s => s.username === currentUser?.username); if(student && student.canViewResults === false) { document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>Access Restricted</h3><p>Contact admin for fee clearance.</p></div></div>`; return; } const myResults = results.filter(r => r.studentId === student?.id && r.status === 'approved'); document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>My Results</h3><table><thead><tr><th>Subject</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myResults.map(r => `<tr><td>${r.subject}</td><td>${r.caScore}</td><td>${r.examScore}</td><td>${r.total}</td><td>${r.grade}</td></tr>`).join('')}</tbody></table></div></div>`; }

    // Start app
    await loadInitialData();
    renderLogin();
    updateHeaderLogo();
</script>
</body>
</html>
