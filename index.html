<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TOP-ELECTS COLLEGE - Advanced Result Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .school-logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .school-logo .default-logo {
            font-size: 30px;
        }
        .header-text h1 {
            font-size: 1.3em;
        }
        .header-text p {
            font-size: 0.8em;
        }
        .menu-toggle {
            display: none;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 5px;
            margin-left: auto;
        }
        .nav {
            background: #f8f9fa;
            padding: 10px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .nav button:hover {
            background: #2a5298;
        }
        .main-content {
            padding: 20px;
            flex: 1;
        }
        .bottom-logout {
            margin: 15px;
            text-align: center;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .bottom-logout button {
            background: #dc3545;
            padding: 10px 20px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #1e3c72;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        /* Tables: responsive scrolling */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 15px 0;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
        }
        th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
            font-size: 1.2em;
        }
        /* Consistent grid system */
        .grid-2, .grid-3, .grid-4 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
        .status-approved { color: green; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .fee-paid { color: green; font-weight: bold; }
        .fee-unpaid { color: red; font-weight: bold; }
        .logo-upload-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .login-box {
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e3c72;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }
        .stat-card h3 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content select { margin-bottom: 15px; }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }
        .active-session-banner {
            background: #e8f0fe;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #1e3c72;
            font-size: 14px;
        }
        .result-type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }
        .result-type-midterm { background: #17a2b8; }
        .result-type-final { background: #28a745; }
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .action-buttons button {
            padding: 4px 8px;
            font-size: 11px;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .nav {
                flex-direction: column;
                align-items: stretch;
            }
            .nav button {
                width: 100%;
                text-align: center;
                white-space: normal;
            }
            .menu-toggle {
                display: block;
            }
            .nav.collapsed {
                display: none;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            th, td {
                font-size: 11px;
                padding: 8px 5px;
            }
            .card {
                padding: 15px;
            }
        }
        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="school-logo" id="schoolLogoContainer"><span class="default-logo">🏫</span></div>
        <div class="header-text"><h1>TOP-ELECTS COLLEGE</h1><p>Advanced Result Portal</p></div>
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰ Menu</button>
    </div>
    <div id="content"></div>
    <div id="logoutContainer" class="bottom-logout"></div>
</div>
<div id="editModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span><h3 id="modalTitle">Edit Item</h3><div id="modalBody"></div><button id="modalSaveBtn">Save Changes</button></div></div>

<script>
    function toggleMobileMenu() { const nav = document.querySelector('.nav'); if (nav) nav.classList.toggle('collapsed'); }
    window.toggleMobileMenu = toggleMobileMenu;
    window.closeModal = function() { document.getElementById('editModal').style.display = 'none'; };
    window.showModal = function(title, bodyHtml, onSave) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('editModal').style.display = 'flex';
        window.modalOnSave = onSave;
        document.getElementById('modalSaveBtn').onclick = () => { if (window.modalOnSave) window.modalOnSave(); closeModal(); };
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4211tsKyps-6VaAhmWzqQcua9bA4bYFY",
        authDomain: "anyportal-4faa1.firebaseapp.com",
        projectId: "anyportal-4faa1",
        storageBucket: "anyportal-4faa1.firebasestorage.app",
        messagingSenderId: "529610323405",
        appId: "1:529610323405:web:049d47c1671c5213c1c084"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let schoolData = { subjects: [], classes: [] };
    let teachers = [], students = [], results = [], teacherSubjects = [], sessions = [], users = [];

    function showAlert(containerId, msg, type='error') { const c = document.getElementById(containerId); if(c) c.innerHTML = `<div class="alert alert-${type}">${msg}</div>`; setTimeout(()=>{if(c)c.innerHTML='';},3000); }

    async function loadInitialData() {
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        if (schoolDoc.exists()) schoolData = schoolDoc.data();
        else { schoolData = { subjects: [{id:"subj_math",name:"Mathematics",code:"MATH101",category:"Core"},{id:"subj_eng",name:"English",code:"ENG101",category:"Core"}], classes: [{id:"class_ss1",name:"SS1",arms:["A","B"]},{id:"class_ss2",name:"SS2",arms:["A","B"]}] }; await setDoc(doc(db,"portal","schoolData"), schoolData); }
        const usnap = await getDocs(collection(db,"users"));
        if(usnap.empty) await addDoc(collection(db,"users"), { username:"admin", password:"admin123", role:"admin", name:"System Administrator", email:"admin@topelects.edu.ng" });
        setupListeners();
    }
    function setupListeners() {
        onSnapshot(collection(db,"teachers"), s=>{ teachers = s.docs.map(d=>({id:d.id,...d.data()})); rerender(); });
        onSnapshot(collection(db,"students"), s=>{ students = s.docs.map(d=>({id:d.id,...d.data()})); rerender(); });
        onSnapshot(collection(db,"results"), s=>{ results = s.docs.map(d=>({id:d.id,...d.data()})); rerender(); });
        onSnapshot(collection(db,"teacherSubjects"), s=>{ teacherSubjects = s.docs.map(d=>({id:d.id,...d.data()})); rerender(); });
        onSnapshot(collection(db,"sessions"), s=>{ sessions = s.docs.map(d=>({id:d.id,...d.data()})); rerender(); });
        onSnapshot(collection(db,"users"), s=>{ users = s.docs.map(d=>({id:d.id,...d.data()})); const saved = localStorage.getItem('portal_currentUser'); if(saved && !currentUser) { const p=JSON.parse(saved); const ex=users.find(u=>u.id===p.id); if(ex) currentUser=ex; else localStorage.removeItem('portal_currentUser'); } rerender(); });
        onSnapshot(doc(db,"portal","schoolData"), d=>{ if(d.exists()) schoolData=d.data(); updateHeaderLogo(); rerender(); });
    }
    function rerender() {
        if(!currentUser) renderLogin();
        else if(currentUser.role==='admin') renderAdminDashboard();
        else if(currentUser.role==='teacher') renderTeacherDashboard();
        else if(currentUser.role==='student') renderStudentDashboard();
        const nav=document.querySelector('.nav'); if(nav) nav.classList.remove('collapsed');
        document.getElementById('logoutContainer').innerHTML = currentUser ? '<button onclick="window.logout()" class="logout-bottom">🚪 Logout</button>' : '';
    }
    async function updateHeaderLogo() {
        const logo = (await getDoc(doc(db,"portal","schoolData"))).data()?.schoolLogo;
        const c=document.getElementById('schoolLogoContainer');
        if(c) c.innerHTML = logo ? `<img src="${logo}" class="school-logo">` : `<span class="default-logo">🏫</span>`;
    }
    // ========== CRUD ==========
    async function addTeacher(d) { const r=await addDoc(collection(db,"teachers"),d); await addDoc(collection(db,"users"),{username:d.username,password:d.password,role:"teacher",name:d.name,email:d.email||"",phone:d.phone||"",teacherId:r.id}); }
    async function deleteTeacher(id) { const t=(await getDoc(doc(db,"teachers",id))).data(); if(t){ const q=query(collection(db,"users"),where("username","==",t.username),where("role","==","teacher")); (await getDocs(q)).forEach(async u=>await deleteDoc(doc(db,"users",u.id))); } await deleteDoc(doc(db,"teachers",id)); for(let ts of teacherSubjects.filter(ts=>ts.teacherId===id)) await deleteDoc(doc(db,"teacherSubjects",ts.id)); }
    async function updateTeacher(id,data) { await updateDoc(doc(db,"teachers",id),data); const t=(await getDoc(doc(db,"teachers",id))).data(); const q=query(collection(db,"users"),where("username","==",t.username),where("role","==","teacher")); (await getDocs(q)).forEach(async u=>await updateDoc(doc(db,"users",u.id),{name:data.name,email:data.email,phone:data.phone})); }
    async function addStudent(d) { const r=await addDoc(collection(db,"students"),d); await addDoc(collection(db,"users"),{username:d.username,password:d.password,role:"student",name:d.name,admissionNo:d.admissionNo,studentId:r.id}); }
    async function deleteStudent(id) { const s=(await getDoc(doc(db,"students",id))).data(); if(s){ const q=query(collection(db,"users"),where("username","==",s.username),where("role","==","student")); (await getDocs(q)).forEach(async u=>await deleteDoc(doc(db,"users",u.id))); } await deleteDoc(doc(db,"students",id)); for(let r of results.filter(r=>r.studentId===id)) await deleteDoc(doc(db,"results",r.id)); }
    async function updateStudent(id,data) { await updateDoc(doc(db,"students",id),data); const s=(await getDoc(doc(db,"students",id))).data(); const q=query(collection(db,"users"),where("username","==",s.username),where("role","==","student")); (await getDocs(q)).forEach(async u=>await updateDoc(doc(db,"users",u.id),{name:data.name,admissionNo:data.admissionNo})); }
    async function addSubject(s) { schoolData.subjects.push(s); await setDoc(doc(db,"portal","schoolData"),schoolData); }
    async function deleteSubject(id) { schoolData.subjects = schoolData.subjects.filter(s=>s.id!==id); await setDoc(doc(db,"portal","schoolData"),schoolData); }
    async function updateSubject(id,n,c,cat) { const idx=schoolData.subjects.findIndex(s=>s.id===id); if(idx!==-1){ schoolData.subjects[idx]={...schoolData.subjects[idx],name:n,code:c,category:cat}; await setDoc(doc(db,"portal","schoolData"),schoolData); } }
    async function addClass(c) { schoolData.classes.push(c); await setDoc(doc(db,"portal","schoolData"),schoolData); }
    async function deleteClass(id) { schoolData.classes = schoolData.classes.filter(c=>c.id!==id); await setDoc(doc(db,"portal","schoolData"),schoolData); }
    async function addArmToClass(id,arm) { const cls=schoolData.classes.find(c=>c.id===id); if(cls && !cls.arms.includes(arm)){ cls.arms.push(arm); await setDoc(doc(db,"portal","schoolData"),schoolData); } }
    async function assignSubject(tid,sid,cls) { await addDoc(collection(db,"teacherSubjects"),{teacherId:tid,subjectId:sid,class:cls}); }
    async function removeTeacherSubject(id) { await deleteDoc(doc(db,"teacherSubjects",id)); }
    async function addResult(data) { await addDoc(collection(db,"results"),data); }
    async function approveResult(id) { await updateDoc(doc(db,"results",id),{status:"approved"}); }
    async function rejectResult(id) { await updateDoc(doc(db,"results",id),{status:"rejected"}); }
    async function editResult(id,scores,type) { let total,grade; if(type==='midterm'){ total=scores.ca1+scores.project+scores.midExam; grade=total>=32?'A':total>=28?'B':total>=20?'C':total>=16?'D':'F'; await updateDoc(doc(db,"results",id),{ca1Score:scores.ca1,projectScore:scores.project,midExamScore:scores.midExam,total,grade,status:'pending'}); } else { total=scores.ca+scores.exam; grade=total>=75?'A':total>=65?'B':total>=50?'C':total>=40?'D':'F'; await updateDoc(doc(db,"results",id),{caScore:scores.ca,examScore:scores.exam,total,grade,status:'pending'}); } }
    async function toggleFee(id,status) { await updateDoc(doc(db,"students",id),{feeStatus:status==='paid'?'unpaid':'paid'}); }
    async function toggleAccess(id,curr) { await updateDoc(doc(db,"students",id),{canViewResults:!curr}); }
    async function setActiveSession(year,term) { for(let s of sessions) await updateDoc(doc(db,"sessions",s.id),{isActive:false}); const ex=sessions.find(s=>s.academicYear===year && s.term===term); if(ex) await updateDoc(doc(db,"sessions",ex.id),{isActive:true}); else await addDoc(collection(db,"sessions"),{academicYear:year,term,isActive:true}); }
    async function deleteUser(userId) { await deleteDoc(doc(db,"users",userId)); }
    // ---------- NEW DELETE RESULT FUNCTION (admin) ----------
    async function deleteResult(resultId) {
        if(confirm('⚠️ Permanently delete this result? This action cannot be undone.')) {
            await deleteDoc(doc(db,"results",resultId));
            alert('Result deleted successfully.');
            // refresh the current admin section
            if(currentUser?.role === 'admin') {
                const activeSection = document.querySelector('#adminContent') ? 
                    (document.querySelector('#adminContent').getAttribute('data-current-section') || 'allResults') : 'allResults';
                window.showAdminSection(activeSection);
            }
        }
    }
    window.deleteResult = deleteResult;

    // ========== LOGIN ==========
    function renderLogin() {
        document.getElementById('content').innerHTML = `<div class="login-box"><h2>🔐 Result Portal Login</h2><div id="loginAlert"></div><div class="form-group"><label>Username</label><input type="text" id="loginUsername"></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword"></div><div class="form-group"><label>Role</label><select id="loginRole"><option value="admin">Admin</option><option value="teacher">Teacher</option><option value="student">Student/Parent</option></select></div><button onclick="window.handleLogin()" style="width:100%">Login</button></div>`;
    }
    window.handleLogin = function() {
        const user = users.find(u=>u.username===document.getElementById('loginUsername').value.trim() && u.password===document.getElementById('loginPassword').value.trim() && u.role===document.getElementById('loginRole').value);
        if(user){ currentUser={id:user.id,username:user.username,role:user.role,name:user.name}; if(currentUser.role==='teacher') currentUser.teacherId=teachers.find(t=>t.username===currentUser.username)?.id; else if(currentUser.role==='student') currentUser.studentId=students.find(s=>s.username===currentUser.username)?.id; localStorage.setItem('portal_currentUser',JSON.stringify(currentUser)); rerender(); } else showAlert('loginAlert','❌ Invalid credentials','error');
    };
    window.logout = function() { currentUser=null; localStorage.removeItem('portal_currentUser'); rerender(); };

    // ========== TEACHER DASHBOARD (with edit capability) ==========
    function renderTeacherDashboard() {
        if(!currentUser.teacherId) currentUser.teacherId = teachers.find(t=>t.username===currentUser.username)?.id;
        document.getElementById('content').innerHTML = `<div class="nav"><button onclick="window.showTeacherSection('midterm')">📝 Mid Term</button><button onclick="window.showTeacherSection('final')">📝 Final Exam</button><button onclick="window.showTeacherSection('myResults')">📊 My Uploads</button><button onclick="window.showTeacherSection('analytics')">📈 Analytics</button></div><div class="main-content" id="teacherContent"><div class="card"><h3>Welcome, ${currentUser.name||currentUser.username}</h3></div></div>`;
        showTeacherSection('midterm');
    }
    // Teacher edit result modal
    window.editTeacherResult = function(id, type, scores) {
        let body='';
        if(type==='midterm') body=`<label>CA1 (0-10)</label><input type="number" id="editCa1" min="0" max="10" value="${scores.ca1}"><label>Project (0-10)</label><input type="number" id="editProject" min="0" max="10" value="${scores.project}"><label>Mid Exam (0-30)</label><input type="number" id="editMidExam" min="0" max="30" value="${scores.midExam}">`;
        else body=`<label>CA (0-40)</label><input type="number" id="editCa" min="0" max="40" value="${scores.ca}"><label>Exam (0-60)</label><input type="number" id="editExam" min="0" max="60" value="${scores.exam}">`;
        window.showModal('Edit Result (will become pending)', body, async() => {
            if(type==='midterm'){
                const ca1=parseInt(document.getElementById('editCa1').value), proj=parseInt(document.getElementById('editProject').value), mid=parseInt(document.getElementById('editMidExam').value);
                if(isNaN(ca1)||isNaN(proj)||isNaN(mid)||ca1<0||ca1>10||proj<0||proj>10||mid<0||mid>30){ alert('Invalid scores'); return; }
                await editResult(id, {ca1, project:proj, midExam:mid}, 'midterm');
            } else {
                const ca=parseInt(document.getElementById('editCa').value), ex=parseInt(document.getElementById('editExam').value);
                if(isNaN(ca)||isNaN(ex)||ca<0||ca>40||ex<0||ex>60){ alert('Invalid scores'); return; }
                await editResult(id, {ca, exam:ex}, 'final');
            }
            alert('Result updated and pending re-approval.');
            showTeacherSection('myResults');
        });
    };
    window.showTeacherSection = function(section) {
        const cont = document.getElementById('teacherContent');
        if(!cont) return;
        const myAssign = teacherSubjects.filter(ts=>ts.teacherId===currentUser.teacherId);
        const activeSess = sessions.find(s=>s.isActive) || { academicYear:'2024/2025', term:'First Term' };
        if(section==='midterm'){
            if(!myAssign.length) { cont.innerHTML = `<div class="card"><div class="alert alert-info">No subjects assigned. Contact admin.</div></div>`; return; }

    window.loadStudentsForMidterm = function() { const id=document.getElementById('midAssignmentSelect')?.value; if(!id) return; const ass=teacherSubjects.find(ts=>ts.id===id); if(!ass) return; const stu=students.filter(s=>s.class===ass.class); const sel=document.getElementById('midStudentSelect'); if(sel) sel.innerHTML='<option value="">-- Student --</option>'+stu.map(s=>`<option value="${s.id}">${s.name} (${s.admissionNo})</option>`).join(''); };
    window.loadStudentsForFinal = function() { const id=document.getElementById('finalAssignmentSelect')?.value; if(!id) return; const ass=teacherSubjects.find(ts=>ts.id===id); if(!ass) return; const stu=students.filter(s=>s.class===ass.class); const sel=document.getElementById('finalStudentSelect'); if(sel) sel.innerHTML='<option value="">-- Student --</option>'+stu.map(s=>`<option value="${s.id}">${s.name} (${s.admissionNo})</option>`).join(''); };
    window.submitMidTermResult = async function() {
        const assId=document.getElementById('midAssignmentSelect')?.value, stuId=document.getElementById('midStudentSelect')?.value, ca1=parseInt(document.getElementById('ca1Score')?.value||0), proj=parseInt(document.getElementById('projectScore')?.value||0), mid=parseInt(document.getElementById('midExamScore')?.value||0);
        if(!assId||!stuId) { showAlert('scoreAlert','Select subject and student','error'); return; }
        if(ca1<0||ca1>10||proj<0||proj>10||mid<0||mid>30) { showAlert('scoreAlert','CA1 0-10, Project 0-10, Mid Exam 0-30','error'); return; }
        const ass=teacherSubjects.find(ts=>ts.id===assId), stu=students.find(s=>s.id===stuId);
        if(!ass||!stu) return;
        const sub=schoolData.subjects.find(s=>s.id===ass.subjectId);
        const total=ca1+proj+mid;
        let grade='F'; if(total>=32) grade='A'; else if(total>=28) grade='B'; else if(total>=20) grade='C'; else if(total>=16) grade='D';
        const active = sessions.find(s=>s.isActive)||{academicYear:'2024/2025',term:'First Term'};
        await addResult({ studentId:stu.id, studentName:stu.name, admissionNo:stu.admissionNo, subjectId:sub.id, subject:sub.name, class:stu.class, term:active.term, academicYear:active.academicYear, resultType:'midterm', ca1Score:ca1, projectScore:proj, midExamScore:mid, total, grade, status:'pending', teacherId:currentUser.teacherId, teacher:currentUser.name||currentUser.username, timestamp:new Date().toISOString() });
        showAlert('scoreAlert','Mid Term result submitted! Pending approval.','success');
        document.getElementById('ca1Score').value='0'; document.getElementById('projectScore').value='0'; document.getElementById('midExamScore').value='0'; document.getElementById('midStudentSelect').value='';
    };
    window.submitFinalResult = async function() {
        const assId=document.getElementById('finalAssignmentSelect')?.value, stuId=document.getElementById('finalStudentSelect')?.value, ca=parseInt(document.getElementById('caScore')?.value||0), exam=parseInt(document.getElementById('examScore')?.value||0);
        if(!assId||!stuId) { showAlert('finalAlert','Select subject and student','error'); return; }
        if(ca<0||ca>40||exam<0||exam>60) { showAlert('finalAlert','CA 0-40, Exam 0-60','error'); return; }
        const ass=teacherSubjects.find(ts=>ts.id===assId), stu=students.find(s=>s.id===stuId);
        if(!ass||!stu) return;
        const sub=schoolData.subjects.find(s=>s.id===ass.subjectId);
        const total=ca+exam;
        let grade='F'; if(total>=75) grade='A'; else if(total>=65) grade='B'; else if(total>=50) grade='C'; else if(total>=40) grade='D';
        const active = sessions.find(s=>s.isActive)||{academicYear:'2024/2025',term:'First Term'};
        await addResult({ studentId:stu.id, studentName:stu.name, admissionNo:stu.admissionNo, subjectId:sub.id, subject:sub.name, class:stu.class, term:active.term, academicYear:active.academicYear, resultType:'final', caScore:ca, examScore:exam, total, grade, status:'pending', teacherId:currentUser.teacherId, teacher:currentUser.name||currentUser.username, timestamp:new Date().toISOString() });
        showAlert('finalAlert','Final Exam result submitted! Pending approval.','success');
        document.getElementById('caScore').value='0'; document.getElementById('examScore').value='0'; document.getElementById('finalStudentSelect').value='';
    };

    };

    // ========== EDIT HANDLERS (all work) ==========
    window.editTeacher = function(id) { const t=teachers.find(t=>t.id===id); if(!t) return; window.showModal('Edit Teacher',`<label>Full Name</label><input type="text" id="editName" value="${t.name.replace(/'/g,"\\'")}"><label>Username</label><input type="text" id="editUsername" value="${t.username.replace(/'/g,"\\'")}"><label>New Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep current"><label>Email</label><input type="email" id="editEmail" value="${(t.email||'').replace(/'/g,"\\'")}"><label>Phone</label><input type="text" id="editPhone" value="${(t.phone||'').replace(/'/g,"\\'")}">`, async()=>{ const n=document.getElementById('editName').value.trim(), u=document.getElementById('editUsername').value.trim(), p=document.getElementById('editPassword').value.trim(), e=document.getElementById('editEmail').value.trim(), ph=document.getElementById('editPhone').value.trim(); if(!n||!u) { alert('Name and Username required'); return; } const upd={name:n,email:e,phone:ph}; if(u!==t.username) upd.username=u; await updateDoc(doc(db,"teachers",id),upd); const q=query(collection(db,"users"),where("username","==",t.username),where("role","==","teacher")); (await getDocs(q)).forEach(async ud=>{ const uup={name:n,email:e,phone:ph}; if(u!==t.username) uup.username=u; if(p) uup.password=p; await updateDoc(doc(db,"users",ud.id),uup); }); showAdminSection('teachers'); alert('Teacher updated!'); }); };
    window.editStudent = function(id) { const s=students.find(s=>s.id===id); if(!s) return; window.showModal('Edit Student',`<label>Full Name</label><input type="text" id="editName" value="${s.name.replace(/'/g,"\\'")}"><label>Admission Number</label><input type="text" id="editAdm" value="${s.admissionNo.replace(/'/g,"\\'")}"><label>Username</label><input type="text" id="editUsername" value="${s.username.replace(/'/g,"\\'")}"><label>New Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep current"><label>Parent Email</label><input type="email" id="editEmail" value="${(s.parentEmail||'').replace(/'/g,"\\'")}">`, async()=>{ const n=document.getElementById('editName').value.trim(), a=document.getElementById('editAdm').value.trim(), u=document.getElementById('editUsername').value.trim(), p=document.getElementById('editPassword').value.trim(), e=document.getElementById('editEmail').value.trim(); if(!n||!a||!u) { alert('Name, Admission, Username required'); return; } const upd={name:n,admissionNo:a,parentEmail:e}; if(u!==s.username) upd.username=u; await updateDoc(doc(db,"students",id),upd); const q=query(collection(db,"users"),where("username","==",s.username),where("role","==","student")); (await getDocs(q)).forEach(async ud=>{ const uup={name:n,admissionNo:a}; if(u!==s.username) uup.username=u; if(p) uup.password=p; await updateDoc(doc(db,"users",ud.id),uup); }); showAdminSection('students'); alert('Student updated!'); }); };
    window.editSubject = function(id) { const sub=schoolData.subjects.find(s=>s.id===id); if(!sub) return; window.showModal('Edit Subject',`<label>Subject Name</label><input type="text" id="editName" value="${sub.name.replace(/'/g,"\\'")}"><label>Code</label><input type="text" id="editCode" value="${sub.code.replace(/'/g,"\\'")}"><label>Category</label><select id="editCat">${['Core','Science','Commercial','Arts','Elective'].map(c=>`<option value="${c}" ${sub.category===c?'selected':''}>${c}</option>`).join('')}</select>`, async()=>{ const n=document.getElementById('editName').value.trim(), c=document.getElementById('editCode').value.trim(), cat=document.getElementById('editCat').value; if(n&&c){ await updateSubject(id,n,c,cat); showAdminSection('subjects'); alert('Subject updated!'); } }); };
    window.editResultModal = function(id,type,scores){ let body=''; if(type==='midterm') body=`<label>CA1 (0-10)</label><input type="number" id="editCa1" min="0" max="10" value="${scores.ca1}"><label>Project (0-10)</label><input type="number" id="editProject" min="0" max="10" value="${scores.project}"><label>Mid Exam (0-30)</label><input type="number" id="editMidExam" min="0" max="30" value="${scores.midExam}">`; else body=`<label>CA (0-40)</label><input type="number" id="editCa" min="0" max="40" value="${scores.ca}"><label>Exam (0-60)</label><input type="number" id="editExam" min="0" max="60" value="${scores.exam}">`; window.showModal('Edit Result (will become pending)',body,async()=>{ if(type==='midterm'){ const ca1=parseInt(document.getElementById('editCa1').value), proj=parseInt(document.getElementById('editProject').value), mid=parseInt(document.getElementById('editMidExam').value); if(isNaN(ca1)||isNaN(proj)||isNaN(mid)||ca1<0||ca1>10||proj<0||proj>10||mid<0||mid>30){ alert('Invalid scores'); return; } await editResult(id,{ca1,project:proj,midExam:mid},'midterm'); } else { const ca=parseInt(document.getElementById('editCa').value), ex=parseInt(document.getElementById('editExam').value); if(isNaN(ca)||isNaN(ex)||ca<0||ca>40||ex<0||ex>60){ alert('Invalid scores'); return; } await editResult(id,{ca,exam:ex},'final'); } showAdminSection('allResults'); alert('Result updated and pending re-approval.'); }); };
    window.withdrawResult = async function(id){ if(confirm('Withdraw this approved result? It will become pending.')){ await updateDoc(doc(db,"results",id),{status:'pending'}); showAdminSection('allResults'); alert('Result withdrawn.'); } };

    // Admin action handlers
    window.addTeacher = async () => { const n=document.getElementById('tName')?.value.trim(), u=document.getElementById('tUser')?.value.trim(), p=document.getElementById('tPass')?.value.trim(); if(n&&u&&p){ await addTeacher({name:n,username:u,password:p,email:document.getElementById('tEmail')?.value.trim(),phone:document.getElementById('tPhone')?.value.trim()}); showAdminSection('teachers'); alert(`Teacher "${n}" added! Username: ${u}`); } else alert('Fill required fields'); };
    window.deleteTeacher = async (id) => { if(confirm('Delete teacher?')) await deleteTeacher(id); showAdminSection('teachers'); };
    window.addStudent = async () => { const n=document.getElementById('sName')?.value.trim(), a=document.getElementById('sAdm')?.value.trim(), c=document.getElementById('sClass')?.value, u=document.getElementById('sUser')?.value.trim(), p=document.getElementById('sPass')?.value.trim(); if(n&&a&&c&&u&&p){ await addStudent({name:n,admissionNo:a,class:c,username:u,password:p,parentEmail:document.getElementById('sParentEmail')?.value.trim(),feeStatus:'unpaid',canViewResults:false}); showAdminSection('students'); alert(`Student "${n}" added! Username: ${u}`); } else alert('Fill required fields'); };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteStudent(id); showAdminSection('students'); };
    window.toggleFee = async (id,status) => { await toggleFee(id,status); showAdminSection('feeManagement'); };
    window.toggleAccess = async (id,curr) => { await toggleAccess(id,curr); showAdminSection('feeManagement'); };
    window.approveResult = async (id) => { await approveResult(id); showAdminSection('resultApproval'); alert('Result approved!'); };
    window.rejectResult = async (id) => { await rejectResult(id); showAdminSection('resultApproval'); alert('Result rejected!'); };
    window.addSubject = async () => { const n=document.getElementById('subjName')?.value.trim(), c=document.getElementById('subjCode')?.value.trim(), cat=document.getElementById('subjCat')?.value; if(n&&c){ await addSubject({id:'subj_'+Date.now(),name:n,code:c,category:cat}); showAdminSection('subjects'); alert(`Subject "${n}" added!`); } else alert('Subject Name and Code required'); };
    window.deleteSubject = async (id) => { if(confirm('Delete subject?')) await deleteSubject(id); showAdminSection('subjects'); };
    window.addClass = async () => { const n=document.getElementById('className')?.value.trim(), arms=document.getElementById('classArms')?.value; if(n&&arms){ await addClass({id:'class_'+Date.now(),name:n,arms:arms.split(',').map(a=>a.trim())}); showAdminSection('classes'); alert(`Class "${n}" added!`); } else alert('Class Name and Arms required'); };
    window.deleteClass = async (id) => { if(confirm('Delete class?')) await deleteClass(id); showAdminSection('classes'); };
    window.addArm = async (id) => { const arm=prompt('Enter new arm name'); if(arm&&arm.trim()) await addArmToClass(id,arm.trim()); showAdminSection('classes'); };
    window.assignSubject = async () => { const tid=document.getElementById('asTeacher')?.value, sid=document.getElementById('asSubject')?.value, cls=document.getElementById('asClass')?.value; if(tid&&sid&&cls){ await assignSubject(tid,sid,cls); showAdminSection('teacherSubjects'); alert('Subject assigned!'); } else alert('Select Teacher, Subject, Class'); };
    window.removeTeacherSubject = async (id) => { if(confirm('Remove assignment?')) await removeTeacherSubject(id); showAdminSection('teacherSubjects'); };
    window.addNewSession = async () => { const y=document.getElementById('newSessionYear')?.value.trim(), t=document.getElementById('newSessionTerm')?.value; if(!y){ alert('Enter academic year'); return; } const exists=sessions.find(s=>s.academicYear===y && s.term===t); if(exists){ alert('Session exists! Use "Set as Active".'); return; } await addDoc(collection(db,"sessions"),{academicYear:y,term:t,isActive:false}); showAdminSection('sessions'); alert(`Session ${t} ${y} added!`); };
    window.setAsActive = async (id,y,t) => { if(confirm(`Set ${t} ${y} as active?`)){ for(let s of sessions) await updateDoc(doc(db,"sessions",s.id),{isActive:false}); await updateDoc(doc(db,"sessions",id),{isActive:true}); showAdminSection('sessions'); alert(`Now active: ${t} ${y}`); } };
    window.searchResults = () => { const term=document.getElementById('searchRes')?.value.toLowerCase(); if(term&&document.getElementById('resTable')){ const filtered=results.filter(r=>r.studentName.toLowerCase().includes(term)||r.subject.toLowerCase().includes(term)); document.getElementById('resTable').innerHTML=`<table><thead><tr><th>Type</th><th>Student</th><th>Subject</th><th>Class</th><th>Scores</th><th>Total</th><th>Grade</th><th>Status</th><th>Actions</th></tr></thead><tbody>${filtered.map(r=>`<tr><td><span class="result-type-badge ${r.resultType==='midterm'?'result-type-midterm':'result-type-final'}">${r.resultType==='midterm'?'Mid Term':'Final'}</span></td><td>${r.studentName}</td><td>${r.subject}</td><td>${r.class}</td><td>${r.resultType==='midterm'?`CA1:${r.ca1Score}, Proj:${r.projectScore}, Exam:${r.midExamScore}`:`CA:${r.caScore}, Exam:${r.examScore}`}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td><td class="${r.status}">${r.status}</td><td class="action-buttons"><button onclick="window.editResultModal('${r.id}','${r.resultType}',${r.resultType==='midterm'?`{ca1:${r.ca1Score},project:${r.projectScore},midExam:${r.midExamScore}}`:`{ca:${r.caScore},exam:${r.examScore}}`})">✏️ Edit</button> ${r.status==='approved'?`<button onclick="window.withdrawResult('${r.id}')">📤 Withdraw</button>`:''}<button onclick="window.deleteResult('${r.id}')" style="background:#dc3545">🗑️ Delete</button></td></tr>`).join('')}</tbody></table>`; } };
    window.deleteUserAccount = async (userId) => { if(confirm('Delete user? This also deletes associated teacher/student data.')){ const u=users.find(u=>u.id===userId); if(u&&u.role==='teacher'){ const t=teachers.find(t=>t.username===u.username); if(t) await deleteTeacher(t.id); } else if(u&&u.role==='student'){ const s=students.find(s=>s.username===u.username); if(s) await deleteStudent(s.id); } else { await deleteDoc(doc(db,"users",userId)); } showAdminSection('users'); alert('User deleted.'); } };
    window.showChangePassword = () => { document.getElementById('adminContent').innerHTML=`<div class="card"><h3>🔐 Change Admin Password</h3><div id="pwdAlert"></div><div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div><div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div><div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword"></div><button onclick="window.updateAdminPassword()">Update</button></div>`; };
    window.updateAdminPassword = async () => { const old=document.getElementById('currentPassword')?.value.trim(), newp=document.getElementById('newPassword')?.value.trim(), conf=document.getElementById('confirmPassword')?.value.trim(); if(!currentUser||currentUser.role!=='admin'){ showAlert('pwdAlert','Not authorized','error'); return; } const admin=users.find(u=>u.id===currentUser.id); if(admin.password!==old){ showAlert('pwdAlert','Current password wrong','error'); return; } if(!newp||newp.length<4){ showAlert('pwdAlert','New password min 4 chars','error'); return; } if(newp!==conf){ showAlert('pwdAlert','Passwords mismatch','error'); return; } await updateDoc(doc(db,"users",currentUser.id),{password:newp}); showAlert('pwdAlert','Password changed! Login again.','success'); setTimeout(()=>logout(),1500); };
    window.showUploadLogo = () => { document.getElementById('adminContent').innerHTML=`<div class="card"><h3>🏫 Upload School Logo</h3><div id="logoAlert"></div><div class="logo-upload-preview" id="logoPreview"><span>🏫</span></div><input type="file" id="logoFile" accept="image/*"><button onclick="window.uploadLogo()">Upload</button><button onclick="window.removeLogo()" style="background:#dc3545">Remove</button></div>`; const inp=document.getElementById('logoFile'); if(inp) inp.onchange=e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ const prev=document.getElementById('logoPreview'); if(prev) prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`; }; r.readAsDataURL(f); } }; };
    window.uploadLogo = async () => { const f=document.getElementById('logoFile')?.files[0]; if(f){ const r=new FileReader(); r.onload=async e=>{ await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:e.target.result}); showAlert('logoAlert','Logo uploaded!','success'); setTimeout(()=>showAdminSection('dashboard'),1000); }; r.readAsDataURL(f); } else alert('Select an image'); };
    window.removeLogo = async () => { if(confirm('Remove logo?')){ await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:null}); showAlert('logoAlert','Logo removed','success'); setTimeout(()=>showAdminSection('dashboard'),1000); } };

    // ========== STUDENT DASHBOARD ==========
    function renderStudentDashboard() {
        const student = students.find(s=>s.username===currentUser?.username);
        const active = sessions.find(s=>s.isActive)||{academicYear:'N/A',term:'No active session'};
        if(student && student.canViewResults===false){ document.getElementById('content').innerHTML=`<div class="main-content"><div class="card"><h3>Access Restricted</h3><p>Please contact school administration.</p></div></div>`; return; }
        const mid = results.filter(r=>r.studentId===student?.id && r.status==='approved' && r.resultType==='midterm');
        const fin = results.filter(r=>r.studentId===student?.id && r.status==='approved' && r.resultType==='final');
        document.getElementById('content').innerHTML = `<div class="main-content"><div class="card"><h3>Welcome, ${student?.name}</h3><p><strong>📅 Active Session: ${active.term} ${active.academicYear}</strong></p></div><div class="card"><h3>📘 Mid Term Results (Total 40)</h3>${mid.length===0?'<p>No approved Mid Term results.</p>':'<div class="table-wrapper"><table><thead><tr><th>Subject</th><th>Class</th><th>CA1 (10)</th><th>Project (10)</th><th>Mid Exam (30)</th><th>Total</th><th>Grade</th></tr></thead><tbody>'+mid.map(r=>`<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.ca1Score}</td><td>${r.projectScore}</td><td>${r.midExamScore}</td><td><strong>${r.total}/40</strong></td><td class="status-approved">${r.grade}</td></tr>`).join('')+'</tbody></table></div>'}</div><div class="card"><h3>📗 Final Exam Results (Total 100)</h3>${fin.length===0?'<p>No approved Final Exam results.</p>':'<div class="table-wrapper"><table><thead><tr><th>Subject</th><th>Class</th><th>CA (40)</th><th>Exam (60)</th><th>Total</th><th>Grade</th></tr></thead><tbody>'+fin.map(r=>`<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.caScore}</td><td>${r.examScore}</td><td><strong>${r.total}/100</strong></td><td class="status-approved">${r.grade}</td></tr>`).join('')+'</tbody></table></div>'}</div></div>`;
    }

    // start
    const saved = localStorage.getItem('portal_currentUser');
    if(saved) currentUser = JSON.parse(saved);
    await loadInitialData();
    if(currentUser && !users.find(u=>u.id===currentUser.id)) { currentUser=null; localStorage.removeItem('portal_currentUser'); }
    else if(currentUser?.role==='teacher') currentUser.teacherId = teachers.find(t=>t.username===currentUser.username)?.id;
    rerender();
    updateHeaderLogo();
</script>
</body>
</html>
