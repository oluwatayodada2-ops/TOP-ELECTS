<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TOP-ELECTS COLLEGE - Result Portal</title>
    <style>
        /* ========== ORIGINAL STYLES (unchanged) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .school-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .school-logo .default-logo {
            font-size: 42px;
        }
        .header-text h1 {
            font-size: 2em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .header-text p {
            font-size: 1em;
            opacity: 0.9;
            font-style: italic;
        }
        .nav {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .nav button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }
        .nav .logout-btn {
            background: #dc3545;
            margin-left: auto;
        }
        .nav .logout-btn:hover {
            background: #c82333;
        }
        .main-content {
            padding: 30px;
            min-height: 500px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }
        button {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #2a5298;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
        }
        .grid-2, .grid-3 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .status-approved { color: green; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .fee-paid { color: green; font-weight: bold; }
        .fee-unpaid { color: red; font-weight: bold; }
        .logo-upload-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #1e3c72;
        }
        .logo-upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .nav button { font-size: 12px; padding: 8px 12px; }
            .header { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="school-logo" id="schoolLogoContainer">
            <span class="default-logo">🏫</span>
        </div>
        <div class="header-text">
            <h1>TOP-ELECTS COLLEGE</h1>
            <p>Result Portal</p>
        </div>
    </div>
    <div id="content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, 
        doc, getDoc, setDoc, updateDoc,
        collection, getDocs, addDoc, deleteDoc, query, where, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4211tsKyps-6VaAhmWzqQcua9bA4bYFY",
        authDomain: "anyportal-4faa1.firebaseapp.com",
        projectId: "anyportal-4faa1",
        storageBucket: "anyportal-4faa1.firebasestorage.app",
        messagingSenderId: "529610323405",
        appId: "1:529610323405:web:049d47c1671c5213c1c084"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ------------------------- GLOBAL STATE -------------------------
    let currentUser = null;        // will have { id, username, role, name, teacherId (if teacher), studentId (if student) }
    let currentTeacherView = 'input';
    let schoolData = { subjects: [], classes: [] };
    let teachers = [];
    let students = [];
    let results = [];
    let teacherSubjects = [];
    let sessions = [];
    let users = [];

    function showAlert(containerId, message, type = 'error') {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => { if (container) container.innerHTML = ''; }, 3000);
    }

    // ------------------------- FIREBASE LISTENERS -------------------------
    async function loadInitialData() {
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        if (schoolDoc.exists()) {
            schoolData = schoolDoc.data();
            if (!schoolData.subjects) schoolData.subjects = [];
            if (!schoolData.classes) schoolData.classes = [];
        } else {
            schoolData = {
                subjects: [
                    { id: "subj_math", name: "Mathematics", code: "MATH101", category: "Core" },
                    { id: "subj_eng", name: "English", code: "ENG101", category: "Core" }
                ],
                classes: [
                    { id: "class_ss1", name: "SS1", arms: ["A", "B"] },
                    { id: "class_ss2", name: "SS2", arms: ["A", "B"] }
                ]
            };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }

        const usersSnapshot = await getDocs(collection(db, "users"));
        if (usersSnapshot.empty) {
            const adminUser = { 
                username: "admin", 
                password: "admin123", 
                role: "admin", 
                name: "System Administrator", 
                email: "admin@topelects.edu.ng" 
            };
            await addDoc(collection(db, "users"), adminUser);
        }
        setupRealtimeListeners();
    }

    function setupRealtimeListeners() {
        onSnapshot(collection(db, "teachers"), (snapshot) => {
            teachers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // If current user is teacher, update teacherId mapping
            if (currentUser && currentUser.role === 'teacher') {
                const teacherRecord = teachers.find(t => t.username === currentUser.username);
                if (teacherRecord) currentUser.teacherId = teacherRecord.id;
            }
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "students"), (snapshot) => {
            students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentUser && currentUser.role === 'student') {
                const studentRecord = students.find(s => s.username === currentUser.username);
                if (studentRecord) currentUser.studentId = studentRecord.id;
            }
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "results"), (snapshot) => {
            results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "teacherSubjects"), (snapshot) => {
            teacherSubjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "sessions"), (snapshot) => {
            sessions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "users"), (snapshot) => {
            users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            console.log("✅ Users loaded:", users.map(u => ({ username: u.username, role: u.role })));
            const saved = localStorage.getItem('portal_currentUser');
            if (saved && !currentUser) {
                const parsed = JSON.parse(saved);
                const exists = users.find(u => u.id === parsed.id);
                if (exists) {
                    currentUser = exists;
                    // If teacher, also fetch teacherId
                    if (currentUser.role === 'teacher') {
                        const teacherRecord = teachers.find(t => t.username === currentUser.username);
                        if (teacherRecord) currentUser.teacherId = teacherRecord.id;
                    } else if (currentUser.role === 'student') {
                        const studentRecord = students.find(s => s.username === currentUser.username);
                        if (studentRecord) currentUser.studentId = studentRecord.id;
                    }
                } else {
                    localStorage.removeItem('portal_currentUser');
                }
            }
            rerenderCurrentView();
        });
        onSnapshot(doc(db, "portal", "schoolData"), (docSnap) => {
            if (docSnap.exists()) {
                schoolData = docSnap.data();
                updateHeaderLogo();
                rerenderCurrentView();
            }
        });
    }

    function rerenderCurrentView() {
        if (!currentUser) {
            renderLogin();
        } else if (currentUser.role === 'admin') {
            renderAdminDashboard();
        } else if (currentUser.role === 'teacher') {
            renderTeacherDashboard();
        } else if (currentUser.role === 'student') {
            renderStudentDashboard();
        }
    }

    async function updateHeaderLogo() {
        const logoContainer = document.getElementById('schoolLogoContainer');
        if (!logoContainer) return;
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        const logo = schoolDoc.exists() ? schoolDoc.data().schoolLogo : null;
        if (logo) {
            logoContainer.innerHTML = `<img src="${logo}" alt="School Logo" class="school-logo">`;
        } else {
            logoContainer.innerHTML = `<span class="default-logo">🏫</span>`;
        }
    }

    // ------------------------- CRUD HELPERS -------------------------
    async function addTeacher(teacherData) {
        teacherData.name = teacherData.name.trim();
        teacherData.username = teacherData.username.trim();
        teacherData.password = teacherData.password.trim();
        if (teacherData.email) teacherData.email = teacherData.email.trim();
        if (teacherData.phone) teacherData.phone = teacherData.phone.trim();
        
        const teacherRef = await addDoc(collection(db, "teachers"), teacherData);
        await addDoc(collection(db, "users"), {
            username: teacherData.username,
            password: teacherData.password,
            role: "teacher",
            name: teacherData.name,
            email: teacherData.email || "",
            phone: teacherData.phone || "",
            teacherId: teacherRef.id
        });
        console.log(`Teacher added: ${teacherData.username}`);
        return teacherRef;
    }

    async function deleteTeacher(id) {
        const teacherDoc = await getDoc(doc(db, "teachers", id));
        if (teacherDoc.exists()) {
            const teacher = teacherDoc.data();
            const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "teachers", id));
        const subs = teacherSubjects.filter(ts => ts.teacherId === id);
        for(let ts of subs) await deleteDoc(doc(db, "teacherSubjects", ts.id));
    }

    async function addStudent(studentData) {
        studentData.name = studentData.name.trim();
        studentData.admissionNo = studentData.admissionNo.trim();
        studentData.class = studentData.class.trim();
        studentData.username = studentData.username.trim();
        studentData.password = studentData.password.trim();
        if (studentData.parentEmail) studentData.parentEmail = studentData.parentEmail.trim();
        
        const studentRef = await addDoc(collection(db, "students"), studentData);
        await addDoc(collection(db, "users"), {
            username: studentData.username,
            password: studentData.password,
            role: "student",
            name: studentData.name,
            admissionNo: studentData.admissionNo,
            studentId: studentRef.id
        });
        console.log(`Student added: ${studentData.username}`);
        return studentRef;
    }

    async function deleteStudent(id) {
        const studentDoc = await getDoc(doc(db, "students", id));
        if (studentDoc.exists()) {
            const student = studentDoc.data();
            const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "students", id));
        const stdResults = results.filter(r => r.studentId === id);
        for(let r of stdResults) await deleteDoc(doc(db, "results", r.id));
    }

    async function addSubject(subject) { schoolData.subjects.push(subject); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteSubject(subjectId) { schoolData.subjects = schoolData.subjects.filter(s => s.id !== subjectId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addClass(newClass) { schoolData.classes.push(newClass); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteClass(classId) { schoolData.classes = schoolData.classes.filter(c => c.id !== classId); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addArmToClass(classId, arm) { const cls = schoolData.classes.find(c => c.id === classId); if(cls && !cls.arms.includes(arm)) { cls.arms.push(arm); await setDoc(doc(db, "portal", "schoolData"), schoolData); } }
    async function assignSubjectToTeacher(teacherId, subjectId, className) { await addDoc(collection(db, "teacherSubjects"), { teacherId, subjectId, class: className }); }
    async function removeTeacherSubject(id) { await deleteDoc(doc(db, "teacherSubjects", id)); }
    async function addResult(resultData) { await addDoc(collection(db, "results"), resultData); }
    async function approveResult(id) { await updateDoc(doc(db, "results", id), { status: "approved" }); }
    async function rejectResult(id) { await updateDoc(doc(db, "results", id), { status: "rejected" }); }
    async function toggleFeeStatus(studentId, currentStatus) { const newStatus = currentStatus === 'paid' ? 'unpaid' : 'paid'; await updateDoc(doc(db, "students", studentId), { feeStatus: newStatus }); }
    async function toggleResultAccess(studentId, currentAccess) { await updateDoc(doc(db, "students", studentId), { canViewResults: !currentAccess }); }
    async function setActiveSession(year, term) { for(let s of sessions) { await updateDoc(doc(db, "sessions", s.id), { isActive: false }); } await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: true }); }
    async function changeAdminPassword(adminId, newPassword) { await updateDoc(doc(db, "users", adminId), { password: newPassword }); }
    async function deleteUser(userId) { await deleteDoc(doc(db, "users", userId)); }

    // ------------------------- LOGIN (with teacherId/studentId lookup) -------------------------
    function renderLogin() {
        const content = `
            <div class="login-box">
                <h2>🔐 Result Portal Login</h2>
                <div id="loginAlert"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="loginRole">
                        <option value="admin">Admin</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student/Parent</option>
                    </select>
                </div>
                <button onclick="window.handleLogin()" style="width: 100%">Login</button>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
    }

    window.handleLogin = async function() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const role = document.getElementById('loginRole').value;
        
        console.log(`Attempting login: ${username} / ${password} as ${role}`);
        const user = users.find(u => u.username === username && u.password === password && u.role === role);
        if (user) {
            currentUser = { id: user.id, username: user.username, role: user.role, name: user.name };
            // If teacher, fetch the teacher document ID
            if (currentUser.role === 'teacher') {
                const teacherRecord = teachers.find(t => t.username === currentUser.username);
                if (teacherRecord) {
                    currentUser.teacherId = teacherRecord.id;
                } else {
                    console.warn("Teacher record not found for username:", username);
                }
            } else if (currentUser.role === 'student') {
                const studentRecord = students.find(s => s.username === currentUser.username);
                if (studentRecord) {
                    currentUser.studentId = studentRecord.id;
                }
            }
            localStorage.setItem('portal_currentUser', JSON.stringify(currentUser));
            rerenderCurrentView();
        } else {
            showAlert('loginAlert', '❌ Invalid credentials. Check console for details.', 'error');
        }
    };

    window.logout = function() { 
        currentUser = null; 
        localStorage.removeItem('portal_currentUser');
        renderLogin(); 
    };

    // ------------------------- TEACHER DASHBOARD (FIXED: uses teacherId) -------------------------
    function renderTeacherDashboard() {
        // Ensure we have the teacherId
        if (!currentUser.teacherId) {
            const teacherRecord = teachers.find(t => t.username === currentUser.username);
            if (teacherRecord) currentUser.teacherId = teacherRecord.id;
        }
        const content = `
            <div class="nav">
                <button onclick="window.showTeacherSection('input')">📝 Input Scores</button>
                <button onclick="window.showTeacherSection('myResults')">📊 My Uploads</button>
                <button onclick="window.showTeacherSection('analytics')">📈 Analytics</button>
                <button class="logout-btn" onclick="window.logout()">🚪 Logout</button>
            </div>
            <div class="main-content" id="teacherContent">
                <div class="card"><h3>Welcome, ${currentUser.name || currentUser.username}</h3><p>Select a subject and student to enter scores. All submissions require admin approval.</p></div>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
        showTeacherSection('input');
    }

    window.showTeacherSection = function(section) {
        currentTeacherView = section;
        const container = document.getElementById('teacherContent');
        if (!container) return;

        if (section === 'input') {
            // Use currentUser.teacherId to filter assignments
            const myAssignments = teacherSubjects.filter(ts => ts.teacherId === currentUser.teacherId);
            const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
            
            if (myAssignments.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <h3>📝 Enter Student Scores</h3>
                        <div class="alert alert-warning">No subjects assigned to you yet. Please contact admin to assign subjects.</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="card">
                    <h3>📝 Enter Student Scores</h3>
                    <div id="scoreAlert"></div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Select Subject & Class</label>
                            <select id="teacherAssignmentSelect" onchange="window.loadStudentsForAssignment()">
                                <option value="">-- Choose Subject & Class --</option>
                                ${myAssignments.map(ass => {
                                    const subject = schoolData.subjects.find(s => s.id === ass.subjectId);
                                    return `<option value="${ass.id}">${subject?.name || ass.subjectId} - ${ass.class}</option>`;
                                }).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Select Student</label>
                            <select id="studentSelect">
                                <option value="">-- First select subject --</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>CA Score (0-40)</label>
                            <input type="number" id="caScore" min="0" max="40" step="1" value="0">
                        </div>
                        <div class="form-group">
                            <label>Exam Score (0-60)</label>
                            <input type="number" id="examScore" min="0" max="60" step="1" value="0">
                        </div>
                    </div>
                    <button onclick="window.submitTeacherResult()">✅ Submit Result (Pending Approval)</button>
                    <div class="alert alert-info" style="margin-top:15px">
                        <strong>Active Session:</strong> ${activeSession.term} ${activeSession.academicYear}
                    </div>
                </div>
            `;
        } 
        else if (section === 'myResults') {
            const myResults = results.filter(r => r.teacherId === currentUser.teacherId);
            container.innerHTML = `
                <div class="card">
                    <h3>📋 My Submitted Results</h3>
                    ${myResults.length === 0 ? '<p>No results submitted yet.</p>' : `
                        <table>

    window.loadStudentsForAssignment = function() {
        const assignmentId = document.getElementById('teacherAssignmentSelect')?.value;
        if (!assignmentId) return;
        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        if (!assignment) return;
        const classStudents = students.filter(s => s.class === assignment.class);
        const studentSelect = document.getElementById('studentSelect');
        if (studentSelect) {
            studentSelect.innerHTML = `<option value="">-- Select Student --</option>` + 
                classStudents.map(s => `<option value="${s.id}" data-name="${s.name}" data-adm="${s.admissionNo}">${s.name} (${s.admissionNo})</option>`).join('');
        }
    };

    window.submitTeacherResult = async function() {
        const assignmentId = document.getElementById('teacherAssignmentSelect')?.value;
        const studentId = document.getElementById('studentSelect')?.value;
        const ca = parseInt(document.getElementById('caScore')?.value || '0');
        const exam = parseInt(document.getElementById('examScore')?.value || '0');

        if (!assignmentId || !studentId) {
            showAlert('scoreAlert', 'Please select subject and student', 'error');
            return;
        }
        if (isNaN(ca) || isNaN(exam) || ca < 0 || ca > 40 || exam < 0 || exam > 60) {
            showAlert('scoreAlert', 'CA must be 0-40, Exam 0-60', 'error');
            return;
        }

        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        const student = students.find(s => s.id === studentId);
        if (!assignment || !student) {
            showAlert('scoreAlert', 'Invalid selection', 'error');
            return;
        }

        const subject = schoolData.subjects.find(s => s.id === assignment.subjectId);
        const total = ca + exam;
        let grade = 'F';
        if (total >= 75) grade = 'A';
        else if (total >= 65) grade = 'B';
        else if (total >= 50) grade = 'C';
        else if (total >= 40) grade = 'D';
        else grade = 'F';

        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        
        const newResult = {
            studentId: student.id,
            studentName: student.name,
            admissionNo: student.admissionNo,
            subjectId: subject.id,
            subject: subject.name,
            class: student.class,
            term: activeSession.term,
            academicYear: activeSession.academicYear,
            caScore: ca,
            examScore: exam,
            total: total,
            grade: grade,
            status: 'pending',
            teacherId: currentUser.teacherId,   // use teacherId, not user id
            teacher: currentUser.name || currentUser.username,
            timestamp: new Date().toISOString()
        };

        const existing = results.find(r => r.studentId === student.id && r.subjectId === subject.id && r.term === activeSession.term && r.academicYear === activeSession.academicYear);
        if (existing) {
            showAlert('scoreAlert', 'Result already exists for this student/subject/term. Please edit via admin.', 'error');
            return;
        }

        await addResult(newResult);
        showAlert('scoreAlert', 'Result submitted successfully! Awaiting admin approval.', 'success');
        document.getElementById('caScore').value = 0;
        document.getElementById('examScore').value = 0;
        document.getElementById('studentSelect').value = '';
    };

    window.updateAdminPassword = async () => { const old = document.getElementById('currentPassword')?.value.trim(), newp = document.getElementById('newPassword')?.value.trim(), conf = document.getElementById('confirmPassword')?.value.trim(); if(!currentUser || currentUser.role !== 'admin') { showAlert('pwdAlert', 'Not authorized', 'error'); return; } const adminUser = users.find(u => u.id === currentUser.id); if(adminUser.password !== old) { showAlert('pwdAlert', 'Current password is incorrect.', 'error'); return; } if(newp !== conf || newp.length < 4) { showAlert('pwdAlert', 'Passwords do not match or too short.', 'error'); return; } await changeAdminPassword(currentUser.id, newp); showAlert('pwdAlert', 'Password changed successfully! Please login again.', 'success'); setTimeout(() => logout(), 1500); };
    window.showUploadLogo = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>🏫 Upload School Logo</h3><div id="logoAlert"></div><div class="logo-upload-preview" id="logoPreview"><span>🏫</span></div><div class="form-group"><label>Select Logo Image (PNG, JPG, GIF)</label><input type="file" id="logoFile" accept="image/*"></div><button onclick="window.uploadLogo()">Upload Logo</button><button onclick="window.removeLogo()" style="background: #dc3545; margin-left: 10px;">Remove Logo</button><div class="alert alert-info" style="margin-top: 15px;"><strong>Note:</strong> Logo will appear in the header of the portal for all users.</div></div>`; const input = document.getElementById('logoFile'); if(input) input.onchange = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (ev) => { const prev = document.getElementById('logoPreview'); if(prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`; }; reader.readAsDataURL(file); } }; };
    window.uploadLogo = async () => { const file = document.getElementById('logoFile')?.files[0]; if(file) { const reader = new FileReader(); reader.onload = async (e) => { await updateDoc(doc(db, "portal", "schoolData"), { schoolLogo: e.target.result }); showAlert('logoAlert', '✅ School logo uploaded successfully!', 'success'); setTimeout(()=>showAdminSection('dashboard'), 1000); }; reader.readAsDataURL(file); } };
    window.removeLogo = async () => { await updateDoc(doc(db, "portal", "schoolData"), { schoolLogo: null }); showAlert('logoAlert', 'Logo removed', 'success'); setTimeout(()=>showAdminSection('dashboard'), 1000); };

    // ------------------------- STUDENT DASHBOARD -------------------------
    function renderStudentDashboard() {
        const student = students.find(s => s.username === currentUser?.username);
        if (student && student.canViewResults === false) {
            document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>Access Restricted</h3><p>Please contact school administration.</p></div></div>`;
            return;
        }
        const myResults = results.filter(r => r.studentId === student?.id && r.status === 'approved');
        document.getElementById('content').innerHTML = `
            <div class="nav"><button onclick="window.showStudentSection('results')">My Results</button><button class="logout-btn" onclick="window.logout()">Logout</button></div>
            <div class="main-content" id="studentContent">
                <div class="card"><h3>Welcome ${student?.name}</h3></div>
                <div class="card"><h3>My Approved Results</h3>${myResults.length === 0 ? '<p>No approved results yet.</p>' : `<table><thead><tr><th>Subject</th><th>Class</th><th>Term</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myResults.map(r => `<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.term}</td><td>${r.caScore}</td><td>${r.examScore}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td></tr>`).join('')}</tbody></table>`}</div>
            </div>
        `;
    }
    window.showStudentSection = function(section) { /* dummy */ };

    // ------------------------- START APPLICATION -------------------------
    const savedUser = localStorage.getItem('portal_currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
    }
    await loadInitialData();
    if (currentUser && !users.find(u => u.id === currentUser.id)) {
        currentUser = null;
        localStorage.removeItem('portal_currentUser');
    } else if (currentUser && currentUser.role === 'teacher') {
        // Ensure teacherId is set after data loads
        const teacherRecord = teachers.find(t => t.username === currentUser.username);
        if (teacherRecord) currentUser.teacherId = teacherRecord.id;
    }
    rerenderCurrentView();
    updateHeaderLogo();
</script>
</body>
</html>
