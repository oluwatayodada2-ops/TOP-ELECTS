<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TOP-ELECTS COLLEGE - Advanced Result Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .school-logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .school-logo .default-logo {
            font-size: 30px;
        }
        .header-text h1 {
            font-size: 1.3em;
        }
        .header-text p {
            font-size: 0.8em;
        }
        .menu-toggle {
            display: none;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 5px;
            margin-left: auto;
        }
        .nav {
            background: #f8f9fa;
            padding: 10px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .nav button:hover {
            background: #2a5298;
        }
        .nav .logout-btn {
            background: #dc3545;
            margin-left: auto;
        }
        .main-content {
            padding: 15px;
            min-height: 400px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #1e3c72;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 15px 0;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
        }
        th {
            background: #1e3c72;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 12px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
            font-size: 1.1em;
        }
        .grid-2, .grid-3 {
            display: grid;
            gap: 15px;
            margin-bottom: 15px;
        }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
        .status-approved { color: green; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        .status-rejected { color: red; font-weight: bold; }
        .fee-paid { color: green; font-weight: bold; }
        .fee-unpaid { color: red; font-weight: bold; }
        .logo-upload-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .login-box {
            max-width: 90%;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3c72;
            font-size: 1.4em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }
        .stat-card h3 {
            font-size: 1.6em;
            margin-bottom: 5px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 22px;
        }
        .active-session-banner {
            background: #e8f0fe;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            color: #1e3c72;
            font-size: 13px;
        }
        .result-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }
        .result-type-midterm { background: #17a2b8; }
        .result-type-final { background: #28a745; }
        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .action-buttons button {
            padding: 5px 8px;
            font-size: 11px;
        }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .nav {
                flex-direction: column;
                align-items: stretch;
            }
            .nav button {
                width: 100%;
                text-align: center;
                white-space: normal;
            }
            .nav .logout-btn {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
            }
            .nav.collapsed {
                display: none;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            th, td {
                font-size: 11px;
                padding: 6px 4px;
            }
        }
        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="school-logo" id="schoolLogoContainer">
            <span class="default-logo">🏫</span>
        </div>
        <div class="header-text">
            <h1>TOP-ELECTS COLLEGE</h1>
            <p>Advanced Result Portal</p>
        </div>
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰ Menu</button>
    </div>
    <div id="content"></div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Edit Item</h3>
        <div id="modalBody"></div>
        <button id="modalSaveBtn">Save Changes</button>
    </div>
</div>

<script>
    function toggleMobileMenu() {
        const nav = document.querySelector('.nav');
        if (nav) nav.classList.toggle('collapsed');
    }
    window.toggleMobileMenu = toggleMobileMenu;
    window.closeModal = function() {
        document.getElementById('editModal').style.display = 'none';
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, 
        doc, getDoc, setDoc, updateDoc,
        collection, getDocs, addDoc, deleteDoc, query, where, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4211tsKyps-6VaAhmWzqQcua9bA4bYFY",
        authDomain: "anyportal-4faa1.firebaseapp.com",
        projectId: "anyportal-4faa1",
        storageBucket: "anyportal-4faa1.firebasestorage.app",
        messagingSenderId: "529610323405",
        appId: "1:529610323405:web:049d47c1671c5213c1c084"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let schoolData = { subjects: [], classes: [] };
    let teachers = [];
    let students = [];
    let results = [];
    let teacherSubjects = [];
    let sessions = [];
    let users = [];

    function showAlert(containerId, message, type = 'error') {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => { if (container) container.innerHTML = ''; }, 3000);
    }

    async function loadInitialData() {
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        if (schoolDoc.exists()) {
            schoolData = schoolDoc.data();
            if (!schoolData.subjects) schoolData.subjects = [];
            if (!schoolData.classes) schoolData.classes = [];
        } else {
            schoolData = {
                subjects: [
                    { id: "subj_math", name: "Mathematics", code: "MATH101", category: "Core" },
                    { id: "subj_eng", name: "English", code: "ENG101", category: "Core" }
                ],
                classes: [
                    { id: "class_ss1", name: "SS1", arms: ["A", "B"] },
                    { id: "class_ss2", name: "SS2", arms: ["A", "B"] }
                ]
            };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }

        const usersSnapshot = await getDocs(collection(db, "users"));
        if (usersSnapshot.empty) {
            await addDoc(collection(db, "users"), { 
                username: "admin", password: "admin123", role: "admin", 
                name: "System Administrator", email: "admin@topelects.edu.ng" 
            });
        }
        setupRealtimeListeners();
    }

    function setupRealtimeListeners() {
        onSnapshot(collection(db, "teachers"), (snapshot) => {
            teachers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "students"), (snapshot) => {
            students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "results"), (snapshot) => {
            results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "teacherSubjects"), (snapshot) => {
            teacherSubjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "sessions"), (snapshot) => {
            sessions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            rerenderCurrentView();
        });
        onSnapshot(collection(db, "users"), (snapshot) => {
            users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const saved = localStorage.getItem('portal_currentUser');
            if (saved && !currentUser) {
                const parsed = JSON.parse(saved);
                const exists = users.find(u => u.id === parsed.id);
                if (exists) currentUser = exists;
                else localStorage.removeItem('portal_currentUser');
            }
            rerenderCurrentView();
        });
        onSnapshot(doc(db, "portal", "schoolData"), (docSnap) => {
            if (docSnap.exists()) {
                schoolData = docSnap.data();
                updateHeaderLogo();
                rerenderCurrentView();
            }
        });
    }

    function rerenderCurrentView() {
        if (!currentUser) renderLogin();
        else if (currentUser.role === 'admin') renderAdminDashboard();
        else if (currentUser.role === 'teacher') renderTeacherDashboard();
        else if (currentUser.role === 'student') renderStudentDashboard();
        const nav = document.querySelector('.nav');
        if (nav) nav.classList.remove('collapsed');
    }

    async function updateHeaderLogo() {
        const logoContainer = document.getElementById('schoolLogoContainer');
        if (!logoContainer) return;
        const schoolDoc = await getDoc(doc(db, "portal", "schoolData"));
        const logo = schoolDoc.exists() ? schoolDoc.data().schoolLogo : null;
        if (logo) {
            logoContainer.innerHTML = `<img src="${logo}" alt="Logo" class="school-logo">`;
        } else {
            logoContainer.innerHTML = `<span class="default-logo">🏫</span>`;
        }
    }

    // CRUD Operations
    async function addTeacher(data) {
        const teacherRef = await addDoc(collection(db, "teachers"), data);
        await addDoc(collection(db, "users"), {
            username: data.username, password: data.password, role: "teacher",
            name: data.name, email: data.email || "", phone: data.phone || "", teacherId: teacherRef.id
        });
    }
    async function deleteTeacher(id) {
        const teacherDoc = await getDoc(doc(db, "teachers", id));
        if (teacherDoc.exists()) {
            const teacher = teacherDoc.data();
            const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "teachers", id));
        const subs = teacherSubjects.filter(ts => ts.teacherId === id);
        for(let ts of subs) await deleteDoc(doc(db, "teacherSubjects", ts.id));
    }
    async function updateTeacher(id, data) {
        await updateDoc(doc(db, "teachers", id), data);
        const teacherDoc = await getDoc(doc(db, "teachers", id));
        const teacher = teacherDoc.data();
        const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
        const userSnap = await getDocs(q);
        userSnap.forEach(async (uDoc) => {
            await updateDoc(doc(db, "users", uDoc.id), { name: data.name, email: data.email, phone: data.phone });
        });
    }
    async function addStudent(data) {
        const studentRef = await addDoc(collection(db, "students"), data);
        await addDoc(collection(db, "users"), {
            username: data.username, password: data.password, role: "student",
            name: data.name, admissionNo: data.admissionNo, studentId: studentRef.id
        });
    }
    async function deleteStudent(id) {
        const studentDoc = await getDoc(doc(db, "students", id));
        if (studentDoc.exists()) {
            const student = studentDoc.data();
            const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (u) => { await deleteDoc(doc(db, "users", u.id)); });
        }
        await deleteDoc(doc(db, "students", id));
        const stdResults = results.filter(r => r.studentId === id);
        for(let r of stdResults) await deleteDoc(doc(db, "results", r.id));
    }
    async function updateStudent(id, data) {
        await updateDoc(doc(db, "students", id), data);
        const studentDoc = await getDoc(doc(db, "students", id));
        const student = studentDoc.data();
        const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
        const userSnap = await getDocs(q);
        userSnap.forEach(async (uDoc) => {
            await updateDoc(doc(db, "users", uDoc.id), { name: data.name, admissionNo: data.admissionNo });
        });
    }
    async function addSubject(subject) { schoolData.subjects.push(subject); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteSubject(id) { schoolData.subjects = schoolData.subjects.filter(s => s.id !== id); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function updateSubject(id, name, code, category) {
        const idx = schoolData.subjects.findIndex(s => s.id === id);
        if (idx !== -1) {
            schoolData.subjects[idx] = { ...schoolData.subjects[idx], name, code, category };
            await setDoc(doc(db, "portal", "schoolData"), schoolData);
        }
    }
    async function addClass(c) { schoolData.classes.push(c); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function deleteClass(id) { schoolData.classes = schoolData.classes.filter(c => c.id !== id); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    async function addArmToClass(id, arm) {
        const cls = schoolData.classes.find(c => c.id === id);
        if (cls && !cls.arms.includes(arm)) { cls.arms.push(arm); await setDoc(doc(db, "portal", "schoolData"), schoolData); }
    }
    async function assignSubject(teacherId, subjectId, className) { await addDoc(collection(db, "teacherSubjects"), { teacherId, subjectId, class: className }); }
    async function removeTeacherSubject(id) { await deleteDoc(doc(db, "teacherSubjects", id)); }
    async function addResult(data) { await addDoc(collection(db, "results"), data); }
    async function approveResult(id) { await updateDoc(doc(db, "results", id), { status: "approved" }); }
    async function rejectResult(id) { await updateDoc(doc(db, "results", id), { status: "rejected" }); }
    async function editResult(id, scores, type) {
        let total, grade;
        if (type === 'midterm') {
            total = scores.ca1 + scores.project + scores.midExam;
            if (total >= 32) grade = 'A';
            else if (total >= 28) grade = 'B';
            else if (total >= 20) grade = 'C';
            else if (total >= 16) grade = 'D';
            else grade = 'F';
            await updateDoc(doc(db, "results", id), { ca1Score: scores.ca1, projectScore: scores.project, midExamScore: scores.midExam, total, grade, status: 'pending' });
        } else {
            total = scores.ca + scores.exam;
            if (total >= 75) grade = 'A';
            else if (total >= 65) grade = 'B';
            else if (total >= 50) grade = 'C';
            else if (total >= 40) grade = 'D';
            else grade = 'F';
            await updateDoc(doc(db, "results", id), { caScore: scores.ca, examScore: scores.exam, total, grade, status: 'pending' });
        }
    }
    async function toggleFee(id, status) { await updateDoc(doc(db, "students", id), { feeStatus: status === 'paid' ? 'unpaid' : 'paid' }); }
    async function toggleAccess(id, curr) { await updateDoc(doc(db, "students", id), { canViewResults: !curr }); }
    async function setActiveSession(year, term) {
        for(let s of sessions) await updateDoc(doc(db, "sessions", s.id), { isActive: false });
        const existing = sessions.find(s => s.academicYear === year && s.term === term);
        if (existing) await updateDoc(doc(db, "sessions", existing.id), { isActive: true });
        else await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: true });
    }
    async function deleteUser(userId) { await deleteDoc(doc(db, "users", userId)); }

    // Login
    function renderLogin() {
        document.getElementById('content').innerHTML = `
            <div class="login-box">
                <h2>🔐 Result Portal Login</h2>
                <div id="loginAlert"></div>
                <div class="form-group"><label>Username</label><input type="text" id="loginUsername"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword"></div>
                <div class="form-group"><label>Role</label><select id="loginRole"><option value="admin">Admin</option><option value="teacher">Teacher</option><option value="student">Student/Parent</option></select></div>
                <button onclick="window.handleLogin()" style="width:100%">Login</button>
            </div>
        `;
    }
    window.handleLogin = function() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const role = document.getElementById('loginRole').value;
        const user = users.find(u => u.username === username && u.password === password && u.role === role);
        if (user) {
            currentUser = { id: user.id, username: user.username, role: user.role, name: user.name };
            if (currentUser.role === 'teacher') {
                const teacherRecord = teachers.find(t => t.username === currentUser.username);
                if (teacherRecord) currentUser.teacherId = teacherRecord.id;
            } else if (currentUser.role === 'student') {
                const studentRecord = students.find(s => s.username === currentUser.username);
                if (studentRecord) currentUser.studentId = studentRecord.id;
            }
            localStorage.setItem('portal_currentUser', JSON.stringify(currentUser));
            rerenderCurrentView();
        } else {
            showAlert('loginAlert', '❌ Invalid credentials', 'error');
        }
    };
    window.logout = function() { currentUser = null; localStorage.removeItem('portal_currentUser'); renderLogin(); };

    // Teacher Dashboard
    function renderTeacherDashboard() {
        if (!currentUser.teacherId) {
            const teacherRecord = teachers.find(t => t.username === currentUser.username);
            if (teacherRecord) currentUser.teacherId = teacherRecord.id;
        }
        document.getElementById('content').innerHTML = `
            <div class="nav">
                <button onclick="window.showTeacherSection('midterm')">📝 Mid Term</button>
                <button onclick="window.showTeacherSection('final')">📝 Final Exam</button>
                <button onclick="window.showTeacherSection('myResults')">📊 My Uploads</button>
                <button onclick="window.showTeacherSection('analytics')">📈 Analytics</button>
                <button class="logout-btn" onclick="window.logout()">🚪 Logout</button>
            </div>
            <div class="main-content" id="teacherContent">
                <div class="card"><h3>Welcome, ${currentUser.name || currentUser.username}</h3></div>
            </div>
        `;
        showTeacherSection('midterm');
    }
    window.showTeacherSection = function(section) {
        const container = document.getElementById('teacherContent');
        if (!container) return;
        const myAssignments = teacherSubjects.filter(ts => ts.teacherId === currentUser.teacherId);
        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        if (section === 'midterm') {
            if (myAssignments.length === 0) {
                container.innerHTML = `<div class="card"><div class="alert alert-info">No subjects assigned. Contact admin.</div></div>`;
                return;
            }
            container.innerHTML = `
                <div class="card">
                    <h3>📝 Mid Term Result (Total 40)</h3>
                    <div id="scoreAlert"></div>
                    <div class="grid-2">

    window.loadStudentsForMidterm = function() {
        const id = document.getElementById('midAssignmentSelect')?.value;
        if (!id) return;
        const assignment = teacherSubjects.find(ts => ts.id === id);
        if (!assignment) return;
        const classStudents = students.filter(s => s.class === assignment.class);
        const select = document.getElementById('midStudentSelect');
        if (select) select.innerHTML = `<option value="">-- Student --</option>` + classStudents.map(s => `<option value="${s.id}">${s.name} (${s.admissionNo})</option>`).join('');
    };
    window.loadStudentsForFinal = function() {
        const id = document.getElementById('finalAssignmentSelect')?.value;
        if (!id) return;
        const assignment = teacherSubjects.find(ts => ts.id === id);
        if (!assignment) return;
        const classStudents = students.filter(s => s.class === assignment.class);
        const select = document.getElementById('finalStudentSelect');
        if (select) select.innerHTML = `<option value="">-- Student --</option>` + classStudents.map(s => `<option value="${s.id}">${s.name} (${s.admissionNo})</option>`).join('');
    };
    window.submitMidTermResult = async function() {
        const assignmentId = document.getElementById('midAssignmentSelect')?.value;
        const studentId = document.getElementById('midStudentSelect')?.value;
        const ca1 = parseInt(document.getElementById('ca1Score')?.value || '0');
        const project = parseInt(document.getElementById('projectScore')?.value || '0');
        const midExam = parseInt(document.getElementById('midExamScore')?.value || '0');
        if (!assignmentId || !studentId) { showAlert('scoreAlert', 'Select subject and student', 'error'); return; }
        if (ca1<0 || ca1>10 || project<0 || project>10 || midExam<0 || midExam>30) { showAlert('scoreAlert', 'Invalid scores', 'error'); return; }
        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        const student = students.find(s => s.id === studentId);
        if (!assignment || !student) return;
        const subject = schoolData.subjects.find(s => s.id === assignment.subjectId);
        const total = ca1 + project + midExam;
        let grade = 'F';
        if (total >= 32) grade = 'A';
        else if (total >= 28) grade = 'B';
        else if (total >= 20) grade = 'C';
        else if (total >= 16) grade = 'D';
        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        await addResult({
            studentId: student.id, studentName: student.name, admissionNo: student.admissionNo,
            subjectId: subject.id, subject: subject.name, class: student.class,
            term: activeSession.term, academicYear: activeSession.academicYear,
            resultType: 'midterm', ca1Score: ca1, projectScore: project, midExamScore: midExam,
            total, grade, status: 'pending', teacherId: currentUser.teacherId,
            teacher: currentUser.name || currentUser.username, timestamp: new Date().toISOString()
        });
        showAlert('scoreAlert', 'Mid Term result submitted!', 'success');
        document.getElementById('ca1Score').value = '';
        document.getElementById('projectScore').value = '';
        document.getElementById('midExamScore').value = '';
    };
    window.submitFinalResult = async function() {
        const assignmentId = document.getElementById('finalAssignmentSelect')?.value;
        const studentId = document.getElementById('finalStudentSelect')?.value;
        const ca = parseInt(document.getElementById('caScore')?.value || '0');
        const exam = parseInt(document.getElementById('examScore')?.value || '0');
        if (!assignmentId || !studentId) { showAlert('finalAlert', 'Select subject and student', 'error'); return; }
        if (ca<0 || ca>40 || exam<0 || exam>60) { showAlert('finalAlert', 'CA 0-40, Exam 0-60', 'error'); return; }
        const assignment = teacherSubjects.find(ts => ts.id === assignmentId);
        const student = students.find(s => s.id === studentId);
        if (!assignment || !student) return;
        const subject = schoolData.subjects.find(s => s.id === assignment.subjectId);
        const total = ca + exam;
        let grade = 'F';
        if (total >= 75) grade = 'A';
        else if (total >= 65) grade = 'B';
        else if (total >= 50) grade = 'C';
        else if (total >= 40) grade = 'D';
        const activeSession = sessions.find(s => s.isActive) || { academicYear: '2024/2025', term: 'First Term' };
        await addResult({
            studentId: student.id, studentName: student.name, admissionNo: student.admissionNo,
            subjectId: subject.id, subject: subject.name, class: student.class,
            term: activeSession.term, academicYear: activeSession.academicYear,
            resultType: 'final', caScore: ca, examScore: exam,
            total, grade, status: 'pending', teacherId: currentUser.teacherId,
            teacher: currentUser.name || currentUser.username, timestamp: new Date().toISOString()
        });
        showAlert('finalAlert', 'Final Exam result submitted!', 'success');
        document.getElementById('caScore').value = '';
        document.getElementById('examScore').value = '';
    };

    window.editTeacher = function(teacherId) {
        const teacher = teachers.find(t => t.id === teacherId);
        if (!teacher) return;
        showModal('Edit Teacher', `
            <label>Name</label><input type="text" id="editName" value="${teacher.name}">
            <label>Username</label><input type="text" id="editUsername" value="${teacher.username}">
            <label>Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep unchanged">
            <label>Email</label><input type="email" id="editEmail" value="${teacher.email || ''}">
            <label>Phone</label><input type="text" id="editPhone" value="${teacher.phone || ''}">
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newUsername = document.getElementById('editUsername').value.trim();
            const newPassword = document.getElementById('editPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            if (!newName || !newUsername) { alert('Name and Username required'); return; }
            const teacherUpdate = { name: newName, email: newEmail, phone: newPhone };
            if (newUsername !== teacher.username) teacherUpdate.username = newUsername;
            await updateDoc(doc(db, "teachers", teacherId), teacherUpdate);
            const q = query(collection(db, "users"), where("username", "==", teacher.username), where("role", "==", "teacher"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (uDoc) => {
                const userUpdate = { name: newName, email: newEmail, phone: newPhone };
                if (newUsername !== teacher.username) userUpdate.username = newUsername;
                if (newPassword) userUpdate.password = newPassword;
                await updateDoc(doc(db, "users", uDoc.id), userUpdate);
            });
            showAdminSection('teachers');
        });
    };
    window.editStudent = function(studentId) {
        const student = students.find(s => s.id === studentId);
        if (!student) return;
        showModal('Edit Student', `
            <label>Name</label><input type="text" id="editName" value="${student.name}">
            <label>Admission No</label><input type="text" id="editAdm" value="${student.admissionNo}">
            <label>Username</label><input type="text" id="editUsername" value="${student.username}">
            <label>Password</label><input type="password" id="editPassword" placeholder="Leave blank to keep unchanged">
            <label>Parent Email</label><input type="email" id="editEmail" value="${student.parentEmail || ''}">
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newAdm = document.getElementById('editAdm').value.trim();
            const newUsername = document.getElementById('editUsername').value.trim();
            const newPassword = document.getElementById('editPassword').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            if (!newName || !newAdm || !newUsername) { alert('Name, Admission, Username required'); return; }
            const studentUpdate = { name: newName, admissionNo: newAdm, parentEmail: newEmail };
            if (newUsername !== student.username) studentUpdate.username = newUsername;
            await updateDoc(doc(db, "students", studentId), studentUpdate);
            const q = query(collection(db, "users"), where("username", "==", student.username), where("role", "==", "student"));
            const userSnap = await getDocs(q);
            userSnap.forEach(async (uDoc) => {
                const userUpdate = { name: newName, admissionNo: newAdm };
                if (newUsername !== student.username) userUpdate.username = newUsername;
                if (newPassword) userUpdate.password = newPassword;
                await updateDoc(doc(db, "users", uDoc.id), userUpdate);
            });
            showAdminSection('students');
        });
    };
    window.editSubject = function(subjectId) {
        const subject = schoolData.subjects.find(s => s.id === subjectId);
        if (!subject) return;
        showModal('Edit Subject', `
            <label>Subject Name</label><input type="text" id="editName" value="${subject.name}">
            <label>Code</label><input type="text" id="editCode" value="${subject.code}">
            <label>Category</label><select id="editCat">${['Core','Science','Commercial','Arts','Elective'].map(cat => `<option value="${cat}" ${subject.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}</select>
        `, async () => {
            const newName = document.getElementById('editName').value.trim();
            const newCode = document.getElementById('editCode').value.trim();
            const newCat = document.getElementById('editCat').value;
            if (newName && newCode) {
                await updateSubject(subjectId, newName, newCode, newCat);
                showAdminSection('subjects');
            }
        });
    };
    window.editResultModal = function(resultId, resultType, scores) {
        let bodyHtml = '';
        if (resultType === 'midterm') {
            bodyHtml = `<label>CA1 (0-10)</label><input type="number" id="editCa1" min="0" max="10" value="${scores.ca1}">
                        <label>Project (0-10)</label><input type="number" id="editProject" min="0" max="10" value="${scores.project}">
                        <label>Mid Exam (0-30)</label><input type="number" id="editMidExam" min="0" max="30" value="${scores.midExam}">`;
        } else {
            bodyHtml = `<label>CA (0-40)</label><input type="number" id="editCa" min="0" max="40" value="${scores.ca}">
                        <label>Exam (0-60)</label><input type="number" id="editExam" min="0" max="60" value="${scores.exam}">`;
        }
        showModal('Edit Result (will become pending)', bodyHtml, async () => {
            if (resultType === 'midterm') {
                const ca1 = parseInt(document.getElementById('editCa1').value);
                const project = parseInt(document.getElementById('editProject').value);
                const midExam = parseInt(document.getElementById('editMidExam').value);
                if (isNaN(ca1) || isNaN(project) || isNaN(midExam) || ca1<0 || ca1>10 || project<0 || project>10 || midExam<0 || midExam>30) {
                    alert('Invalid scores');
                    return;
                }
                await editResult(resultId, { ca1, project, midExam }, 'midterm');
            } else {
                const ca = parseInt(document.getElementById('editCa').value);
                const exam = parseInt(document.getElementById('editExam').value);
                if (isNaN(ca) || isNaN(exam) || ca<0 || ca>40 || exam<0 || exam>60) {
                    alert('Invalid scores');
                    return;
                }
                await editResult(resultId, { ca, exam }, 'final');
            }
            showAdminSection('allResults');
        });
    };
    window.withdrawResult = async function(resultId) {
        if (confirm('Withdraw this approved result? It will become pending and require re-approval.')) {
            await updateDoc(doc(db, "results", resultId), { status: 'pending' });
            showAdminSection('allResults');
        }
    };

    // Admin action handlers
    window.addTeacher = async () => { const name=document.getElementById('tName')?.value.trim(), user=document.getElementById('tUser')?.value.trim(), pass=document.getElementById('tPass')?.value.trim(); if(name&&user&&pass) { await addTeacher({ name, username: user, password: pass, email: document.getElementById('tEmail')?.value.trim(), phone: document.getElementById('tPhone')?.value.trim() }); showAdminSection('teachers'); alert(`Teacher ${user} added.`); } else alert('Fill required fields'); };
    window.deleteTeacher = async (id) => { if(confirm('Delete teacher?')) await deleteTeacher(id); showAdminSection('teachers'); };
    window.addStudent = async () => { const name=document.getElementById('sName')?.value.trim(), adm=document.getElementById('sAdm')?.value.trim(), cls=document.getElementById('sClass')?.value, user=document.getElementById('sUser')?.value.trim(), pass=document.getElementById('sPass')?.value.trim(); if(name&&adm&&cls&&user&&pass) { await addStudent({ name, admissionNo: adm, class: cls, username: user, password: pass, parentEmail: document.getElementById('sParentEmail')?.value.trim(), feeStatus: 'unpaid', canViewResults: false }); showAdminSection('students'); alert(`Student ${user} added.`); } else alert('Fill required fields'); };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteStudent(id); showAdminSection('students'); };
    window.toggleFee = async (id, status) => { await toggleFee(id, status); showAdminSection('feeManagement'); };
    window.toggleAccess = async (id, curr) => { await toggleAccess(id, curr); showAdminSection('feeManagement'); };
    window.approveResult = async (id) => { await approveResult(id); showAdminSection('resultApproval'); };
    window.rejectResult = async (id) => { await rejectResult(id); showAdminSection('resultApproval'); };
    window.addSubject = async () => { const name=document.getElementById('subjName')?.value.trim(), code=document.getElementById('subjCode')?.value.trim(), cat=document.getElementById('subjCat')?.value; if(name&&code) { await addSubject({ id: 'subj_'+Date.now(), name, code, category: cat }); showAdminSection('subjects'); } };
    window.deleteSubject = async (id) => { if(confirm('Delete subject?')) await deleteSubject(id); showAdminSection('subjects'); };
    window.addClass = async () => { const name=document.getElementById('className')?.value.trim(), arms=document.getElementById('classArms')?.value; if(name&&arms) { await addClass({ id: 'class_'+Date.now(), name, arms: arms.split(',').map(a=>a.trim()) }); showAdminSection('classes'); } };
    window.deleteClass = async (id) => { if(confirm('Delete class?')) await deleteClass(id); showAdminSection('classes'); };
    window.addArm = async (id) => { const arm=prompt('Enter arm name'); if(arm) await addArmToClass(id, arm.trim()); showAdminSection('classes'); };
    window.assignSubject = async () => { const tid=document.getElementById('asTeacher')?.value, sid=document.getElementById('asSubject')?.value, cls=document.getElementById('asClass')?.value; if(tid&&sid&&cls) { await assignSubject(tid, sid, cls); showAdminSection('teacherSubjects'); } };
    window.removeTeacherSubject = async (id) => { await removeTeacherSubject(id); showAdminSection('teacherSubjects'); };
    window.addNewSession = async () => { const year = document.getElementById('newSessionYear')?.value.trim(); const term = document.getElementById('newSessionTerm')?.value; if(!year) { alert('Enter academic year'); return; } const exists = sessions.find(s => s.academicYear === year && s.term === term); if(exists) { alert('Session already exists. Use "Set Active" from list.'); return; } await addDoc(collection(db, "sessions"), { academicYear: year, term, isActive: false }); showAdminSection('sessions'); };
    window.setAsActive = async function(sessionId, year, term) { if(confirm(`Set ${term} ${year} as active session?`)) { for(let s of sessions) { await updateDoc(doc(db, "sessions", s.id), { isActive: false }); } await updateDoc(doc(db, "sessions", sessionId), { isActive: true }); showAdminSection('sessions'); } };
    window.searchResults = () => { const term = document.getElementById('searchRes')?.value.toLowerCase(); if(term && document.getElementById('resTable')) { const filtered = results.filter(r => r.studentName.toLowerCase().includes(term) || r.subject.toLowerCase().includes(term)); document.getElementById('resTable').innerHTML = `<table><thead><tr><th>Type</th><th>Student</th><th>Subject</th><th>Scores</th><th>Total</th><th>Grade</th><th>Status</th><th>Actions</th></tr></thead><tbody>${filtered.map(r => `<tr><td><span class="result-type-badge ${r.resultType === 'midterm' ? 'result-type-midterm' : 'result-type-final'}">${r.resultType === 'midterm' ? 'Mid' : 'Final'}</span></td><td>${r.studentName}</td><td>${r.subject}</td><td>${r.resultType === 'midterm' ? `CA1:${r.ca1Score}, Proj:${r.projectScore}, Exam:${r.midExamScore}` : `CA:${r.caScore}, Exam:${r.examScore}`}</td><td>${r.total}</td><td>${r.grade}</td><td class="${r.status}">${r.status}</td><td class="action-buttons"><button onclick="window.editResultModal('${r.id}', '${r.resultType}', ${r.resultType === 'midterm' ? `{ca1:${r.ca1Score}, project:${r.projectScore}, midExam:${r.midExamScore}}` : `{ca:${r.caScore}, exam:${r.examScore}}`})">Edit</button> ${r.status === 'approved' ? `<button onclick="window.withdrawResult('${r.id}')">Withdraw</button>` : ''}</tr>`).join('')}</tbody></table>`; } };
    window.deleteUserAccount = async (userId) => { if(confirm('Delete user?')) { const user=users.find(u=>u.id===userId); if(user&&user.role==='teacher') { const teacher=teachers.find(t=>t.username===user.username); if(teacher) await deleteTeacher(teacher.id); } else if(user&&user.role==='student') { const student=students.find(s=>s.username===user.username); if(student) await deleteStudent(student.id); } else { await deleteDoc(doc(db,"users",userId)); } showAdminSection('users'); } };
    window.showChangePassword = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>🔐 Change Admin Password</h3><div id="pwdAlert"></div><div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div><div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div><div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword"></div><button onclick="window.updateAdminPassword()">Update</button></div>`; };
    window.updateAdminPassword = async () => { const old=document.getElementById('currentPassword')?.value.trim(), newp=document.getElementById('newPassword')?.value.trim(), conf=document.getElementById('confirmPassword')?.value.trim(); if(!currentUser||currentUser.role!=='admin'){showAlert('pwdAlert','Not authorized','error');return;} const adminUser=users.find(u=>u.id===currentUser.id); if(adminUser.password!==old){showAlert('pwdAlert','Current password wrong','error');return;} if(newp!==conf||newp.length<4){showAlert('pwdAlert','Mismatch or too short','error');return;} await updateDoc(doc(db, "users", currentUser.id), { password: newp }); showAlert('pwdAlert','Password changed! Login again.','success'); setTimeout(()=>logout(),1500); };
    window.showUploadLogo = () => { document.getElementById('adminContent').innerHTML = `<div class="card"><h3>🏫 Upload Logo</h3><div id="logoAlert"></div><div class="logo-upload-preview" id="logoPreview"><span>🏫</span></div><input type="file" id="logoFile" accept="image/*"><button onclick="window.uploadLogo()">Upload</button><button onclick="window.removeLogo()">Remove</button></div>`; const input=document.getElementById('logoFile'); if(input) input.onchange=(e)=>{const file=e.target.files[0]; if(file){const reader=new FileReader(); reader.onload=(ev)=>{const prev=document.getElementById('logoPreview'); if(prev) prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;}; reader.readAsDataURL(file);}}; };
    window.uploadLogo = async () => { const file=document.getElementById('logoFile')?.files[0]; if(file){const reader=new FileReader(); reader.onload=async(e)=>{await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:e.target.result}); showAlert('logoAlert','Logo uploaded!','success'); setTimeout(()=>showAdminSection('dashboard'),1000);}; reader.readAsDataURL(file);}};
    window.removeLogo = async () => { await updateDoc(doc(db,"portal","schoolData"),{schoolLogo:null}); showAlert('logoAlert','Logo removed','success'); setTimeout(()=>showAdminSection('dashboard'),1000); };

    // Student Dashboard
    function renderStudentDashboard() {
        const student = students.find(s => s.username === currentUser?.username);
        const activeSession = sessions.find(s => s.isActive) || { academicYear: 'N/A', term: 'No active session' };
        if (student && student.canViewResults === false) {
            document.getElementById('content').innerHTML = `<div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div><div class="main-content"><div class="card"><h3>Access Restricted</h3><p>Please contact school administration.</p></div></div>`;
            return;
        }
        const myMidterm = results.filter(r => r.studentId === student?.id && r.status === 'approved' && r.resultType === 'midterm');
        const myFinal = results.filter(r => r.studentId === student?.id && r.status === 'approved' && r.resultType === 'final');
        document.getElementById('content').innerHTML = `
            <div class="nav"><button class="logout-btn" onclick="window.logout()">Logout</button></div>
            <div class="main-content">
                <div class="card"><h3>Welcome, ${student?.name}</h3><p><strong>📅 Active Session: ${activeSession.term} ${activeSession.academicYear}</strong></p></div>
                <div class="card"><h3>📘 Mid Term Results</h3>${myMidterm.length === 0 ? '<p>No approved Mid Term results.</p>' : `<div class="table-wrapper"><table><thead><tr><th>Subject</th><th>Class</th><th>CA1</th><th>Project</th><th>Mid Exam</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myMidterm.map(r => `<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.ca1Score}</td><td>${r.projectScore}</td><td>${r.midExamScore}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td></tr>`).join('')}</tbody></table></div>`}</div>
                <div class="card"><h3>📗 Final Exam Results</h3>${myFinal.length === 0 ? '<p>No approved Final Exam results.</p>' : `<div class="table-wrapper"><table><thead><tr><th>Subject</th><th>Class</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th></tr></thead><tbody>${myFinal.map(r => `<tr><td>${r.subject}</td><td>${r.class}</td><td>${r.caScore}</td><td>${r.examScore}</td><td><strong>${r.total}</strong></td><td>${r.grade}</td></tr>`).join('')}</tbody></table></div>`}</div>
            </div>
        `;
    }

    // Start App
    const savedUser = localStorage.getItem('portal_currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
    }
    await loadInitialData();
    if (currentUser && !users.find(u => u.id === currentUser.id)) {
        currentUser = null;
        localStorage.removeItem('portal_currentUser');
    } else if (currentUser && currentUser.role === 'teacher') {
        const teacherRecord = teachers.find(t => t.username === currentUser.username);
        if (teacherRecord) currentUser.teacherId = teacherRecord.id;
    }
    rerenderCurrentView();
    updateHeaderLogo();
</script>
</body>
</html>
